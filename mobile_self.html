<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 그림책 만들기</title>

<style>
body {
    font-family: sans-serif;
    padding: 20px;
    background: #f5f5f5;
}

h2 {
    text-align: center;
}

input, textarea {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 18px;
    margin-top: 20px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #4CAF50;
    color: white;
}

button:active {
    background: #45a049;
}
</style>
</head>

<body>

<h2>📖 AI 그림책 만들기</h2>

<label>이름</label>
<input type="text" id="name" placeholder="예: 영숙 할머니">

<label>주인공이 하고 싶은 것</label>
<input type="text" id="dream" placeholder="예: 맛있는 음식을 만들고 싶어요">

<label>기억에 남는 이야기</label>
<textarea id="story" rows="4" placeholder="예: 손주들과 함께 요리했던 날"></textarea>

<button onclick="goChatGPT()">👉 그림책 만들기</button>

<script>
function goChatGPT() {

    let name = document.getElementById("name").value.trim();
    let dream = document.getElementById("dream").value.trim();
    let story = document.getElementById("story").value.trim();

    if (!name || !dream || !story) {
        alert("모든 내용을 입력해주세요 😊");
        return;
    }

    let prompt = `
너는 따뜻한 감성의 그림책 작가이다.

다음 정보를 바탕으로
어르신이 감동할 수 있는 5페이지 그림책을 만들어라.

[주인공]
이름: ${name}
꿈: ${dream}
이야기: ${story}

[출력 형식]

제목:

1페이지  
내용:  
이미지프롬프트:  

2페이지  
내용:  
이미지프롬프트:  

3페이지  
내용:  
이미지프롬프트:  

4페이지  
내용:  
이미지프롬프트:  

5페이지  
내용:  
이미지프롬프트:  
`;

    // ✅ 클립보드 복사
    navigator.clipboard.writeText(prompt).then(function() {

        alert("✅ 내용이 자동 복사되었습니다!\n👉 ChatGPT에서 붙여넣기 해주세요");

        // ✅ ChatGPT 열기
        window.open("https://chat.openai.com/?model=gpt-4o", "_blank");

    }, function(err) {
        alert("❌ 복사 실패! 다시 시도해주세요");
    });
}
</script>

</body>
</html>
