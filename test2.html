<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>서초50플러스 - AI 그림책 도우미</title>
<style>
* { box-sizing: border-box; }

:root{
    --green:#2e7d32;
    --green-border:#9ccc9c;
    --purple:#7e57c2;
    --bg:#f4f6f8;
    --card:#ffffff;
    --text:#1f2933;
    --sub:#52606d;
    --shadow:0 6px 18px rgba(0,0,0,0.08);
    --orange:#ef8f00;
    --blue:#1fa3e0;
    --gray:#a0a8b0;
    --disabled:#cfd8dc;
}

html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    -webkit-text-size-adjust: 100%;
}

body {
    line-height: 1.6;
}

.container {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    padding: 12px 14px 36px;
}

.tab-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 4px 0 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding-top: 6px;
    padding-bottom: 6px;
}

.tab-btn {
    min-height: 54px;
    padding: 12px 10px;
    font-size: 18px;
    font-weight: 800;
    border-radius: 18px;
    background: #d9dde1;
    color: #334155;
    border: none;
    text-align: center;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.tab-btn.active {
    background: var(--green);
    color: white;
    box-shadow: 0 4px 12px rgba(46,125,50,0.22);
}

.section-card {
    background: var(--card);
    border-radius: 22px;
    padding: 18px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
}

.label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 16px;
    margin-bottom: 8px;
}

.label-row label {
    margin: 0;
    flex: 1;
}

.example-mini-btn {
    flex: 0 0 auto;
    min-width: 64px;
    width: auto;
    margin-top: 0;
    padding: 8px 12px;
    font-size: 15px;
    font-weight: 800;
    border-radius: 12px;
    border: 2px solid var(--green-border);
    background: white;
    color: var(--green);
}

label {
    display: block;
    font-size: 19px;
    font-weight: 800;
    line-height: 1.5;
    color: var(--text);
}

.input-wrap {
    position: relative;
}

input, textarea {
    width: 100%;
    min-height: 58px;
    padding: 16px 66px 16px 16px;
    font-size: 19px;
    line-height: 1.6;
    border-radius: 18px;
    border: 2px solid var(--green-border);
    background: #fff;
    color: var(--text);
    outline: none;
}

textarea {
    min-height: 132px;
    resize: vertical;
}

input::placeholder,
textarea::placeholder {
    color: #9aa5b1;
}

input:focus,
textarea:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 4px rgba(46,125,50,0.10);
}

.mic-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border: none;
    border-radius: 999px;
    background: #eef2f5;
    font-size: 22px;
    cursor: pointer;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.textarea-wrap .mic-btn {
    top: 12px;
    transform: none;
}

.mic-btn.recording {
    background: #ff4d4d;
    color: white;
}

.mic-status {
    margin-top: 8px;
    min-height: 24px;
    font-size: 16px;
    color: var(--green);
    font-weight: 700;
}

.gender-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 6px;
}

.gender-btn {
    min-height: 54px;
    padding: 12px 10px;
    font-size: 18px;
    font-weight: 800;
    border-radius: 18px;
    border: 2px solid #cfd8df;
    background: white;
    text-align: center;
    cursor: pointer;
    user-select: none;
    display: flex;
    justify-content: center;
    align-items: center;
}

.gender-btn.active {
    background: var(--green);
    color: white;
    border-color: var(--green);
}

.style-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 6px;
}

.style-btn {
    min-height: 64px;
    padding: 10px 8px;
    font-size: 15px;
    font-weight: 800;
    border-radius: 16px;
    border: 2px solid #cfd8df;
    background: white;
    color: #334155;
    text-align: center;
    cursor: pointer;
    user-select: none;
    display: flex;
    justify-content: center;
    align-items: center;
    line-height: 1.35;
}

.style-btn.active {
    background: var(--green);
    color: white;
    border-color: var(--green);
}

button, .link-btn {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 13px 14px;
    font-size: 18px;
    font-weight: 800;
    margin-top: 10px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.main-btn {
    background: var(--green);
    color: white;
}

.smart-btn {
    background: var(--purple);
    color: white;
}

.gray-btn {
    background: var(--gray);
    color: white;
}

.link-btn {
    background: var(--blue);
    color: white;
}

button:disabled {
    background: var(--disabled) !important;
    color: #6b7280 !important;
    cursor: not-allowed;
    box-shadow: none;
}

.notice-box {
    background: #eef7ff;
    border-radius: 18px;
    padding: 16px;
    font-size: 16px;
    line-height: 1.7;
    margin-top: 14px;
    color: #234;
}

.prompt-box {
    background: #fffef7;
    border: 2px solid #efe2a1;
    border-radius: 18px;
    padding: 14px;
    margin-top: 14px;
    font-size: 18px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
    min-height: 110px;
}

.result-box {
    background: #fffef8;
    border: 2px solid #efe6bc;
    border-radius: 14px;
    padding: 8px 10px;
    margin-top: 8px;
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
}

.box-header {
    font-size: 16px;
    font-weight: 900;
    margin-bottom: 4px;
    color: var(--green);
    line-height: 1.3;
}

.box-content {
    margin-bottom: 6px;
    line-height: 1.45;
}

.box-footer {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 2px;
}

.copy-box-btn,
.open-box-btn {
    margin-top: 0;
    width: 100%;
    padding: 8px 10px;
    font-size: 14px;
    border-radius: 12px;
    min-height: 40px;
}

.copy-box-btn {
    background: var(--orange);
    color: white;
}

.open-box-btn {
    background: var(--blue);
    color: white;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hidden {
    display: none;
}

.two-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
}

.bottom-reset {
    margin-top: 18px;
}

@media (max-width: 480px) {
    .container { padding: 10px 12px 30px; }
    .tab-btn { font-size: 17px; min-height: 52px; }
    .section-card { padding: 16px 14px; }
    label { font-size: 18px; }
    input, textarea { font-size: 18px; }
    button, .link-btn { font-size: 17px; padding: 12px 12px; }
    .prompt-box { font-size: 17px; }
    .result-box { font-size: 15px; padding: 8px 10px; }
    .box-header { font-size: 15px; }
    .copy-box-btn, .open-box-btn { font-size: 13px; padding: 8px 8px; min-height: 38px; }
    .example-mini-btn { font-size: 14px; min-width: 58px; }
    .style-btn {
        font-size: 13px;
        min-height: 62px;
        padding: 8px 6px;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="tab-btns">
        <button id="tab1" class="tab-btn active" onclick="switchTab(1)">💡 생각주머니</button>
        <button id="tab2" class="tab-btn" onclick="switchTab(2)">📚 만들기상자</button>
    </div>

    <div id="tabContent1">
        <div class="section-card">

            <div class="label-row">
                <label for="userName">1. 성함이 어떻게 되시나요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('userName')">그대로 사용 ⭕</button>
            </div>
            <div class="input-wrap">
                <input type="text" id="userName" placeholder="예: 김영자">
                <button type="button" class="mic-btn" onclick="startVoice('userName', this)" aria-label="성함 음성입력">🎤</button>
            </div>
            <div id="micStatusName" class="mic-status"></div>

            <div class="label-row">
                <label>2. 성별을 선택해주세요</label>
            </div>
            <div class="gender-btns">
                <button type="button" id="btn-female" class="gender-btn active" onclick="setGender('할머니','btn-female')">할머니</button>
                <button type="button" id="btn-male" class="gender-btn" onclick="setGender('할아버지','btn-male')">할아버지</button>
            </div>

            <div class="label-row">
                <label for="personality">3. 성격은 어떠신가요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('personality')">그대로 사용 ⭕</button>
            </div>
            <div class="input-wrap">
                <input type="text" id="personality" placeholder="예: 따뜻하고 다정해요">
                <button type="button" class="mic-btn" onclick="startVoice('personality', this)" aria-label="성격 음성입력">🎤</button>
            </div>
            <div id="micStatusPersonality" class="mic-status"></div>

            <div class="label-row">
                <label for="childhood">4. 어린 시절 기억나는 장면은 무엇인가요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('childhood')">그대로 사용 ⭕</button>
            </div>
            <div class="input-wrap">
                <input type="text" id="childhood" placeholder="예: 시골에서 친구들과 뛰어놀았어요">
                <button type="button" class="mic-btn" onclick="startVoice('childhood', this)" aria-label="어린 시절 음성입력">🎤</button>
            </div>
            <div id="micStatusChildhood" class="mic-status"></div>

            <div class="label-row">
                <label for="specialMoment">5. 가장 특별하거나 행복했던 순간은 언제였나요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('specialMoment')">그대로 사용 ⭕</button>
            </div>
            <div class="input-wrap">
                <input type="text" id="specialMoment" placeholder="예: 손주가 태어났을 때">
                <button type="button" class="mic-btn" onclick="startVoice('specialMoment', this)" aria-label="특별한 순간 음성입력">🎤</button>
            </div>
            <div id="micStatusSpecialMoment" class="mic-status"></div>

            <div class="label-row">
                <label for="valuableThing">6. 지금 가장 소중하게 생각하는 것은 무엇인가요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('valuableThing')">그대로 사용 ⭕</button>
            </div>
            <div class="input-wrap">
                <input type="text" id="valuableThing" placeholder="예: 가족과 건강">
                <button type="button" class="mic-btn" onclick="startVoice('valuableThing', this)" aria-label="소중한 것 음성입력">🎤</button>
            </div>
            <div id="micStatusValuableThing" class="mic-status"></div>

            <div class="label-row">
                <label for="futureWish">7. 앞으로 하고 싶은 일이나 바람은 무엇인가요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('futureWish')">그대로 사용 ⭕</button>
            </div>
            <div class="input-wrap textarea-wrap">
                <textarea id="futureWish" rows="4" placeholder="예: 건강하게 지내며 손주와 여행도 가고, 내 이야기를 책으로 남기고 싶어요"></textarea>
                <button type="button" class="mic-btn" onclick="startVoice('futureWish', this)" aria-label="앞으로의 바람 음성입력">🎤</button>
            </div>
            <div id="micStatusFutureWish" class="mic-status"></div>

            <div class="label-row">
                <label>8. 그림책 스타일을 선택해주세요</label>
            </div>
            <div class="style-btns" id="storyStyleGroup">
                <button type="button" id="style-warm" class="style-btn active" onclick="setStoryStyle('warm','style-warm')">🌼 따뜻한 감동형</button>
                <button type="button" id="style-happy" class="style-btn" onclick="setStoryStyle('happy','style-happy')">😊 밝고 즐거운 추억형</button>
                <button type="button" id="style-hope" class="style-btn" onclick="setStoryStyle('hope','style-hope')">🌈 희망과 꿈 강조형</button>
            </div>

            <div class="label-row">
                <label>9. 그림 스타일을 선택해주세요</label>
            </div>
            <div class="style-btns" id="artStyleGroup">
                <button type="button" id="art-ghibli" class="style-btn active" onclick="setArtStyle('ghibli','art-ghibli')">🌿 따뜻한 동화 느낌 (지브리)</button>
                <button type="button" id="art-pencil" class="style-btn" onclick="setArtStyle('pencil','art-pencil')">🎨 손그림 색연필 느낌</button>
                <button type="button" id="art-cute" class="style-btn" onclick="setArtStyle('cute','art-cute')">🌸 밝고 귀여운 캐릭터 스타일</button>
            </div>

            <button class="main-btn" onclick="generatePrompt()">👉 이야기 만들기</button>

            <div class="notice-box">
                음성 입력은 크롬이 가장 좋아요
            </div>

            <div id="promptPreview" class="prompt-box"></div>

            <button id="copyOpenBtn" class="smart-btn" onclick="copyPromptAndOpenChatGPT()" disabled>👉 복사하고 ChatGPT 열기</button>

            <button class="gray-btn bottom-reset" onclick="resetThinkingTab()">👉 전체 지우기</button>
        </div>
    </div>

    <div id="tabContent2" class="hidden">
        <div class="section-card">
            <label for="fullText">ChatGPT에서 나온 전체 텍스트를 여기에 붙여넣으세요</label>
            <textarea id="fullText" rows="10" placeholder="전체 텍스트 붙여넣기"></textarea>

            <div class="two-btns">
                <button class="main-btn" onclick="parseText()">👉 결과 나누어 보기</button>
            </div>

            <div id="parsedOutput"></div>

            <button class="gray-btn bottom-reset" onclick="resetMakerTab()">👉 전체 지우기</button>
        </div>
    </div>
</div>

<script>
let selectedGender = "할머니";
let selectedStoryStyle = "warm";
let selectedArtStyle = "ghibli";
let currentRecognition = null;

const CHATGPT_URL = "https://chat.openai.com/";
const CANVA_URL = "https://www.canva.com";
const FLOW_URL = "https://labs.google/fx/ko/tools/flow";

const STORAGE_KEYS = {
    userName: "storybook_userName",
    personality: "storybook_personality",
    childhood: "storybook_childhood",
    specialMoment: "storybook_specialMoment",
    valuableThing: "storybook_valuableThing",
    futureWish: "storybook_futureWish",
    fullText: "storybook_fullText",
    promptPreview: "storybook_promptPreview",
    selectedGender: "storybook_selectedGender",
    selectedStoryStyle: "storybook_selectedStoryStyle",
    selectedArtStyle: "storybook_selectedArtStyle",
    parsedOutput: "storybook_parsedOutput"
};

const EXAMPLE_VALUES = {
    userName: "김영자",
    personality: "따뜻하고 다정해요",
    childhood: "시골에서 친구들과 뛰어놀았어요",
    specialMoment: "손주가 태어났을 때",
    valuableThing: "가족과 건강",
    futureWish: "건강하게 지내며 손주와 여행도 가고, 내 이야기를 책으로 남기고 싶어요"
};

function switchTab(n){
    document.getElementById("tabContent1").classList.toggle("hidden", n !== 1);
    document.getElementById("tabContent2").classList.toggle("hidden", n !== 2);
    document.getElementById("tab1").classList.toggle("active", n === 1);
    document.getElementById("tab2").classList.toggle("active", n === 2);
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function setGender(g, btnId){
    selectedGender = g;
    document.querySelectorAll(".gender-btn").forEach(btn => btn.classList.remove("active"));
    document.getElementById(btnId).classList.add("active");
    saveToStorage(STORAGE_KEYS.selectedGender, selectedGender);
}

function setStoryStyle(styleKey, btnId){
    selectedStoryStyle = styleKey;
    document.querySelectorAll("#storyStyleGroup .style-btn").forEach(btn => btn.classList.remove("active"));
    document.getElementById(btnId).classList.add("active");
    saveToStorage(STORAGE_KEYS.selectedStoryStyle, selectedStoryStyle);
}

function setArtStyle(styleKey, btnId){
    selectedArtStyle = styleKey;
    document.querySelectorAll("#artStyleGroup .style-btn").forEach(btn => btn.classList.remove("active"));
    document.getElementById(btnId).classList.add("active");
    saveToStorage(STORAGE_KEYS.selectedArtStyle, selectedArtStyle);
}

function getStoryStyleText(){
    if(selectedStoryStyle === "happy"){
        return `[이야기 분위기]
이야기는 밝고 경쾌한 분위기로 작성합니다.
어린 시절과 행복했던 순간을 즐겁게 표현합니다.
읽는 사람이 미소 짓도록 따뜻한 유머를 살짝 담습니다.
전체적으로 밝고 생동감 있게 전개합니다.`;
    }

    if(selectedStoryStyle === "hope"){
        return `[이야기 분위기]
이야기는 희망과 앞으로의 삶에 초점을 맞춥니다.
주인공의 바람과 꿈이 자연스럽게 드러나도록 합니다.
읽는 사람이 용기와 희망을 느끼도록 합니다.
마지막은 미래를 향한 따뜻한 메시지로 마무리합니다.`;
    }

    return `[이야기 분위기]
이야기는 짧고 따뜻한 문장으로 작성합니다.
읽는 사람이 편안함과 감동을 느낄 수 있도록 합니다.
잔잔하고 따뜻한 분위기로 전개하며,
마지막은 마음이 따뜻해지는 여운으로 마무리합니다.`;
}

function getArtStyleText(){
    if(selectedArtStyle === "pencil"){
        return `colored pencil drawing, hand-drawn illustration, soft texture, paper grain, warm nostalgic feeling, consistent character design`;
    }

    if(selectedArtStyle === "cute"){
        return `cute character illustration, soft pastel colors, simple shapes, friendly expression, bright and cheerful mood, consistent character design`;
    }

    return `Ghibli-inspired, soft watercolor illustration, warm light, gentle children's book style, cinematic composition, consistent character design`;
}

function getArtStyleGuideKo(){
    if(selectedArtStyle === "pencil"){
        return `그림은 손그림 색연필 느낌으로 표현해 주세요. 종이 질감과 부드러운 색연필 터치가 느껴지게 하고, 따뜻한 추억의 분위기가 살아나게 해 주세요.`;
    }

    if(selectedArtStyle === "cute"){
        return `그림은 밝고 귀여운 캐릭터 스타일로 표현해 주세요. 부드러운 파스텔 색감과 단순한 형태, 친근한 표정이 느껴지게 해 주세요.`;
    }

    return `그림은 따뜻한 동화 느낌의 지브리 감성으로 표현해 주세요. 부드러운 수채화 느낌과 따뜻한 빛, 영화 같은 장면 구성이 느껴지게 해 주세요.`;
}

function showShortMessage(message){
    alert(message);
}

function fillOneExample(targetId){
    const el = document.getElementById(targetId);
    if(!el) return;
    el.value = EXAMPLE_VALUES[targetId] || "";
    triggerAutoSave(targetId);

function saveToStorage(key, value){
    try {
        localStorage.setItem(key, value);
    } catch(e) {}
}

function loadFromStorage(key){
    try {
        return localStorage.getItem(key) || "";
    } catch(e) {
        return "";
    }
}

async function copyText(text){
    if(!text) return false;

    if(navigator.clipboard && window.isSecureContext){
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch(e) {
            return fallbackCopy(text);
        }
    }
    return fallbackCopy(text);
}

function fallbackCopy(text){
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    textarea.style.top = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    let success = false;
    try {
        success = document.execCommand("copy");
    } catch(e) {
        success = false;
    }

    document.body.removeChild(textarea);
    return success;
}

function clearAllMicStates(){
    document.querySelectorAll(".mic-btn").forEach(btn => {
        btn.classList.remove("recording");
        btn.textContent = "🎤";
    });
}

function startVoice(targetId, btnEl){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const statusEl = getStatusEl(targetId);

    if(!SpeechRecognition){
        alert("이 기기에서는 음성 입력이 지원되지 않아요.");
        return;
    }

    if(currentRecognition){
        try { currentRecognition.stop(); } catch(e) {}
        currentRecognition = null;
        clearAllMicStates();
    }

    const recognition = new SpeechRecognition();
    currentRecognition = recognition;

    recognition.lang = "ko-KR";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    if(btnEl){
        btnEl.classList.add("recording");
        btnEl.textContent = "🔴";
    }

    if(statusEl) statusEl.textContent = "듣고 있어요";

    try {
        recognition.start();
    } catch(e) {
        if(statusEl) statusEl.textContent = "";
        clearAllMicStates();
        currentRecognition = null;
        return;
    }

    recognition.onresult = function(event){
        const text = event.results[0][0].transcript || "";
        const target = document.getElementById(targetId);
        if(target){
            target.value = text.trim();
            triggerAutoSave(targetId);
        }
        if(statusEl){
            statusEl.textContent = "";
        }
    };

    recognition.onerror = function(){
        if(statusEl){
            statusEl.textContent = "";
        }
        clearAllMicStates();
        currentRecognition = null;
    };

    recognition.onend = function(){
        clearAllMicStates();
        currentRecognition = null;
        if(statusEl){
            setTimeout(() => { statusEl.textContent = ""; }, 300);
        }
    };
}

function createCopyBox(title, content, type){
    const safeTitle = escapeHtml(title);
    const safeContent = escapeHtml(content || "");

    if(type === "flow"){
        return `
            <div class="result-box">
                <div class="box-header">${safeTitle}</div>
                <div class="box-content">${safeContent}</div>
                <div class="box-footer" style="grid-template-columns: 1fr;">
                    <button class="open-box-btn" onclick="copyAndOpenFlow(this)">📋 복사하고 플로우 열기</button>
                </div>
            </div>
        `;
    }

    return `
        <div class="result-box">
            <div class="box-header">${safeTitle}</div>
            <div class="box-content">${safeContent}</div>
            <div class="box-footer">
                <button class="copy-box-btn" onclick="copyBox(this)">📋 복사</button>
                <a href="${CANVA_URL}" class="open-box-btn" target="_blank" rel="noopener">🎨 캔바 열기</a>
            </div>
        </div>
    `;
}

function parseText(){
    const full = document.getElementById("fullText").value.trim();
    const output = document.getElementById("parsedOutput");

    if(!full){
        alert("텍스트를 붙여넣어 주세요.");
        return;
    }

    saveToStorage(STORAGE_KEYS.fullText, full);

    let parsedHTML = "";
    const title = extractSingleLine(full, /(?:^|\n)\s*제목\s*:\s*(.+)/i);
    const coverKo = extractSectionByLabel(full, `표지\\s*이미지\\s*프롬프트\\s*\\(한글\\)`);
    const coverEn = extractSectionByLabel(full, `표지\\s*이미지\\s*프롬프트\\s*\\(영어\\)`);

    if(title){
        parsedHTML += createCopyBox("제목", title, "canva");
    }

    let combinedCoverPrompt = "";
    if(coverKo){
        combinedCoverPrompt += `표지 이미지 프롬프트(한글):\n${coverKo}`;
    }
    if(coverEn){
        if(combinedCoverPrompt) combinedCoverPrompt += `\n\n`;
        combinedCoverPrompt += `표지 이미지 프롬프트(영어):\n${coverEn}`;
    }
    if(combinedCoverPrompt){
        parsedHTML += createCopyBox("표지 그림명령어", combinedCoverPrompt, "flow");
    }

    for(let i = 1; i <= 4; i++){
        const pageText = extractSectionByLabel(full, `${i}\\s*페이지\\s*내용`);
        const imgKo = extractSectionByLabel(full, `${i}\\s*페이지\\s*이미지\\s*프롬프트\\s*\\(한글\\)`);
        const imgEn = extractSectionByLabel(full, `${i}\\s*페이지\\s*이미지\\s*프롬프트\\s*\\(영어\\)`);

        if(pageText){
            parsedHTML += createCopyBox(`${i}페이지 글`, pageText, "canva");
        }

        let combinedPrompt = "";
        if(imgKo){
            combinedPrompt += `${i}페이지 이미지 프롬프트(한글):\n${imgKo}`;
        }
        if(imgEn){
            if(combinedPrompt) combinedPrompt += `\n\n`;
            combinedPrompt += `${i}페이지 이미지 프롬프트(영어):\n${imgEn}`;
        }

        if(combinedPrompt){
            parsedHTML += createCopyBox(`${i}페이지 그림명령어`, combinedPrompt, "flow");
        }
    }

    if(!parsedHTML){
        parsedHTML = `<div class="result-box">분류할 내용을 찾지 못했습니다.

확인해주세요:
1. 제목:
2. 표지 이미지 프롬프트(한글):
3. 표지 이미지 프롬프트(영어):
4. 1페이지 내용:
5. 1페이지 이미지 프롬프트(한글):
6. 1페이지 이미지 프롬프트(영어):</div>`;
    }

    output.innerHTML = parsedHTML;
    saveToStorage(STORAGE_KEYS.parsedOutput, parsedHTML);
    showShortMessage("이야기가 만들어졌어요");
    output.scrollIntoView({ behavior: "smooth", block: "start" });
}

function extractSingleLine(fullText, regex){
    const match = fullText.match(regex);
    return match && match[1] ? match[1].trim() : "";
}

function extractSectionByLabel(fullText, labelPattern){
    const regex = new RegExp(
        `(?:^|\\n)\\s*${labelPattern}\\s*:\\s*([\\s\\S]*?)(?=\\n\\s*(?:제목|표지\\s*이미지\\s*프롬프트\\s*\\(한글\\)|표지\\s*이미지\\s*프롬프트\\s*\\(영어\\)|\\d+\\s*페이지\\s*내용|\\d+\\s*페이지\\s*이미지\\s*프롬프트\\s*\\(한글\\)|\\d+\\s*페이지\\s*이미지\\s*프롬프트\\s*\\(영어\\))\\s*:|$)`,
        "i"
    );
    const match = fullText.match(regex);
    return match && match[1] ? match[1].trim() : "";
}

async function copyBox(btn){
    const box = btn.closest(".result-box");
    const contentEl = box.querySelector(".box-content");
    const text = contentEl ? contentEl.innerText.trim() : "";

    if(!text){
        alert("복사할 내용이 없습니다.");
        return;
    }

    const ok = await copyText(text);

    if(ok){
        const originalText = btn.textContent;
        btn.textContent = "✅ 복사됨";
        btn.style.background = "#2e7d32";
        showShortMessage("복사했어요");
        setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = "#ef8f00";
        }, 1500);
    } else {
        alert("복사에 실패했습니다.");
    }
}

async function copyAndOpenFlow(btn){
    const box = btn.closest(".result-box");
    const contentEl = box.querySelector(".box-content");
    const text = contentEl ? contentEl.innerText.trim() : "";

    if(!text){
        alert("복사할 내용이 없습니다.");
        return;
    }

    const ok = await copyText(text);

    if(ok){
        const originalText = btn.textContent;
        btn.textContent = "✅ 복사하고 열기";
        btn.style.background = "#2e7d32";
        showShortMessage("복사했어요");

        window.open(FLOW_URL, "_blank", "noopener");

        setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = "#1fa3e0";
        }, 1500);
    } else {
        window.open(FLOW_URL, "_blank", "noopener");
    }
}

function attachAutoSave(){

function escapeHtml(str){
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}
