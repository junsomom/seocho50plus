<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 기분으로 30초 음악 만들기</title>

<style>
body {margin:0;font-family:sans-serif;background:#f5f6fa;}
.wrap {max-width:600px;margin:auto;padding:20px;}

.top {
  background:linear-gradient(135deg,#4a7cff,#7f9cff);
  color:#fff;padding:20px;border-radius:20px;
}

.block {
  background:#fff;margin-top:15px;padding:15px;border-radius:16px;
}

button {
  width:100%;padding:18px;margin:6px 0;
  font-size:18px;border-radius:14px;border:2px solid #ddd;
  background:#fff;
}

button.active {
  border-color:#4a7cff;background:#eef4ff;
}

textarea {
  width:100%;padding:12px;border-radius:12px;margin-top:10px;
}

.tools button {width:32%;font-size:14px;}

.main-btn {
  background:#4a7cff;color:#fff;font-size:20px;margin-top:15px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="top">
<h1>오늘 기분으로 30초 음악 만들기</h1>
<p>지금 내 마음을 고르고, 나만의 노래를 만들어보세요 😊</p>
</div>

<!-- 1 -->
<div class="block">
<h3>지금 기분을 골라보세요</h3>

<div id="moodButtons">
<button onclick="selectMood('기뻐요',this)">😊 기뻐요</button>
<button onclick="selectMood('슬퍼요',this)">😢 슬퍼요</button>
<button onclick="selectMood('속상해요',this)">😡 속상해요</button>
<button onclick="selectMood('편안해요',this)">😌 편안해요</button>
</div>

<textarea id="moodEtc" placeholder="직접 입력"></textarea>

<div class="tools">
<button onclick="voice('moodEtc')">🎤 말로 입력</button>
<button onclick="clearTxt('moodEtc')">지우기</button>
<button onclick="example('moodEtc','설레고 행복해요')">예시 넣기</button>
</div>

<p id="moodText"></p>
</div>

<!-- 2 -->
<div class="block">
<h3>왜 그런 마음이 드셨나요?</h3>

<textarea id="reason" placeholder="한 줄로 적어보세요"></textarea>

<div class="tools">
<button onclick="voice('reason')">🎤 말로 입력</button>
<button onclick="clearTxt('reason')">지우기</button>
<button onclick="example('reason','손주를 만나서 행복했어요')">예시 넣기</button>
</div>

<p id="reasonText"></p>
</div>

<!-- 3 -->
<div class="block">
<h3>노래 느낌</h3>
<p id="recommend">기분을 고르면 자동 추천됩니다</p>

<div id="styleButtons">
<button onclick="setStyle('밝고 신나요',this)">😊 밝음</button>
<button onclick="setStyle('따뜻함',this)">🌷 따뜻</button>
<button onclick="setStyle('감성적',this)">🌙 감성</button>
<button onclick="setStyle('힘나는',this)">💪 힘</button>
</div>

<p id="styleText"></p>
</div>

<!-- 4 -->
<div class="block">
<h3>노래 / 연주곡</h3>

<div id="typeButtons">
<button onclick="typeSel('노래',this)">🎤 노래</button>
<button onclick="typeSel('연주곡',this)">🎹 연주곡</button>
</div>
</div>

<!-- 5 -->
<div class="block">
<h3>음악 스타일</h3>

<div id="genreButtons">
<button onclick="genreSel('트로트',this)">트로트</button>
<button onclick="genreSel('가요',this)">가요</button>
<button onclick="genreSel('동요',this)">동요</button>
</div>
</div>

<!-- 결과 -->
<div class="block">
<h3>완성</h3>

<textarea id="out"></textarea>

<button class="main-btn" onclick="make()">노래 만들기 준비하기</button>
<button onclick="copy()">복사하기</button>

</div>

</div>

<script>

let mood="",style="",type="노래",genre="가요";

function selectMood(m,b){
  mood=m;
  document.querySelectorAll("#moodButtons button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");

  document.getElementById("moodText").innerText="기분: "+m;

  let rec="따뜻함";
  if(m=="기뻐요") rec="밝고 신나요";
  if(m=="슬퍼요") rec="따뜻함";
  if(m=="속상해요") rec="힘나는";
  if(m=="편안해요") rec="따뜻함";

  document.getElementById("recommend").innerText="추천: "+rec;
  applyRecommendedStyle(rec);
}

function applyRecommendedStyle(rec){
  style=rec;
  document.querySelectorAll("#styleButtons button").forEach(btn=>{
    btn.classList.remove("active");
    if(btn.innerText.includes("밝음") && rec==="밝고 신나요") btn.classList.add("active");
    if(btn.innerText.includes("따뜻") && rec==="따뜻함") btn.classList.add("active");
    if(btn.innerText.includes("감성") && rec==="감성적") btn.classList.add("active");
    if(btn.innerText.includes("힘") && rec==="힘나는") btn.classList.add("active");
  });
  document.getElementById("styleText").innerText="느낌: "+rec;
}

function setStyle(s,b){
  style=s;
  document.querySelectorAll("#styleButtons button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  document.getElementById("styleText").innerText="느낌: "+s;
}

function typeSel(t,b){
  type=t;
  document.querySelectorAll("#typeButtons button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
}

function genreSel(g,b){
  genre=g;
  document.querySelectorAll("#genreButtons button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
}

function make(){
  let m=document.getElementById("moodEtc").value || mood;
  let r=document.getElementById("reason").value;

  let txt=`30초 ${style} ${genre} ${type}.
${m} 감정으로 시작하고 ${r} 내용을 담아
마지막은 따뜻하고 희망적으로 마무리.
자연스럽고 완성도 있게 만들어줘`;

  document.getElementById("out").value=txt;
}

function copy(){
  navigator.clipboard.writeText(document.getElementById("out").value);
  alert("복사했어요! 이제 붙여넣어 주세요 😊");
}

function clearTxt(id){
  document.getElementById(id).value="";
}

function example(id,txt){
  document.getElementById(id).value=txt;
}

function voice(id){
  alert("이제 말씀해 주세요 🎤");
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;

  const recognition = new SpeechRecognition();
  recognition.lang="ko-KR";

  recognition.onresult=function(e){
    document.getElementById(id).value=e.results[0][0].transcript;
  };

  recognition.start();
}

</script>

</body>
</html>
