<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3주차 노래선물상자</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #342b22;
      line-height: 1.6;
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 225, 180, 0.22) 0, rgba(255, 225, 180, 0) 26%),
        radial-gradient(circle at 88% 14%, rgba(212, 224, 255, 0.20) 0, rgba(212, 224, 255, 0) 24%),
        radial-gradient(circle at 80% 82%, rgba(255, 210, 190, 0.20) 0, rgba(255, 210, 190, 0) 22%),
        linear-gradient(180deg, #f7efde 0%, #f3ead8 55%, #efe3cf 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 18px 12px 36px;
    }

    .top-card {
      position: relative;
      overflow: hidden;
      color: #fffaf5;
      border-radius: 22px;
      padding: 22px 20px 18px;
      margin-bottom: 16px;
      background:
        linear-gradient(135deg, rgba(82, 66, 132, 0.96), rgba(126, 88, 171, 0.93) 52%, rgba(192, 121, 121, 0.88));
      box-shadow:
        0 16px 34px rgba(96, 71, 50, 0.20),
        inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .top-card::before,
    .top-card::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,0.11);
    }

    .top-card::before {
      width: 180px;
      height: 180px;
      right: -30px;
      top: -55px;
      box-shadow: inset 0 0 0 10px rgba(255,255,255,0.06);
    }

    .top-card::after {
      width: 110px;
      height: 110px;
      left: -18px;
      bottom: -24px;
      box-shadow: inset 0 0 0 8px rgba(255,255,255,0.05);
    }

    .top-card h1 {
      position: relative;
      margin: 0;
      font-size: 24px;
      line-height: 1.28;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .top-card h1::before {
      content: "♪ ";
      opacity: 0.95;
    }

    .top-card p {
      position: relative;
      margin: 8px 0 0;
      font-size: 14px;
      opacity: 0.95;
    }

    .question-block {
      position: relative;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid rgba(168, 137, 91, 0.32);
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0px,
          rgba(0, 0, 0, 0) 23px,
          rgba(124, 101, 67, 0.14) 23px,
          rgba(124, 101, 67, 0.14) 24px
        ),
        linear-gradient(180deg, #fff8e8 0%, #f7edd7 100%);
      box-shadow:
        0 8px 20px rgba(120, 90, 50, 0.15),
        inset 0 0 20px rgba(150,120,80,0.08),
        inset 0 1px 0 rgba(255,255,255,0.55);
    }

    .question-block::after {
      content: "♪ ♫";
      position: absolute;
      right: 14px;
      bottom: 10px;
      font-size: 18px;
      letter-spacing: 2px;
      color: rgba(120, 90, 50, 0.20);
      pointer-events: none;
    }

    .question-number,
    .sub-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      padding: 5px 12px;
      margin-bottom: 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f4ead2, #eadbb7);
      color: #7b5c2f;
      font-weight: 800;
      font-size: 13px;
      border: 1px solid rgba(156, 121, 67, 0.25);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    h2, h3 {
      margin: 0 0 12px;
      line-height: 1.35;
      color: #3d3126;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    h2 { font-size: 20px; }
    h3 { font-size: 17px; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .stack {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 15px 14px;
      border-radius: 18px;
      border: 1.5px solid #dcc9a2;
      background:
        linear-gradient(180deg, #fffdf7 0%, #f6ecd6 100%);
      color: #3b2f24;
      font-size: 16px;
      line-height: 1.35;
      text-align: left;
      word-break: keep-all;
      cursor: pointer;
      box-shadow:
        0 4px 10px rgba(124, 96, 54, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.75);
      transition: transform 0.15s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow:
        0 8px 16px rgba(124, 96, 54, 0.12),
        inset 0 1px 0 rgba(255,255,255,0.85);
    }

    button:active {
      transform: scale(0.99);
    }

    button.active {
      border-color: #c89233;
      background:
        linear-gradient(180deg, #ffe7b3 0%, #ffd98a 100%);
      color: #6f4512;
      font-weight: 800;
      box-shadow:
        0 8px 18px rgba(188, 138, 48, 0.24),
        inset 0 1px 0 rgba(255,255,255,0.65);
      transform: scale(1.02);
    }

    textarea {
      width: 100%;
      min-height: 92px;
      padding: 14px;
      border-radius: 14px;
      border: 1.5px solid #dcc9a2;
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      background: linear-gradient(180deg, #fffdf8, #f8eedc);
      box-shadow: inset 0 1px 2px rgba(110, 84, 48, 0.05);
      color: #352c25;
    }

    textarea::placeholder {
      color: #9c907d;
    }

    textarea:focus {
      outline: none;
      border-color: #c89233;
      box-shadow:
        0 0 0 4px rgba(200, 146, 51, 0.12),
        inset 0 1px 2px rgba(110, 84, 48, 0.05);
    }

    .tool-row {
      display: grid;
      grid-template-columns: repeat(3, 58px);
      gap: 10px;
      justify-content: start;
      margin-top: 10px;
    }

    .tool-row button {
      text-align: center;
      padding: 12px 0;
      font-size: 22px;
      border-radius: 16px;
      background: linear-gradient(180deg, #fff8e8, #f0dfbf);
    }

    .recording {
      background: linear-gradient(180deg, #fff0f0, #ffdede) !important;
      border-color: #d89a9a !important;
      color: #b33d3d !important;
      font-weight: 800;
    }

    .sub-card {
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0px,
          rgba(0, 0, 0, 0) 23px,
          rgba(124, 101, 67, 0.10) 23px,
          rgba(124, 101, 67, 0.10) 24px
        ),
        linear-gradient(180deg, #fff8e8 0%, #f4ead2 100%);
      border: 1px solid rgba(168, 137, 91, 0.28);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .hidden {
      display: none;
    }

    .result-box {
      min-height: 280px;
      margin-top: 12px;
      line-height: 1.72;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0px,
          rgba(0, 0, 0, 0) 23px,
          rgba(124, 101, 67, 0.13) 23px,
          rgba(124, 101, 67, 0.13) 24px
        ),
        linear-gradient(180deg, #fff8e8 0%, #f5ecd7 100%);
      border: 1.5px solid #d8c29a;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.72),
        0 6px 18px rgba(170, 140, 90, 0.10);
    }

    .main-buttons {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .main-buttons button {
      text-align: center;
      font-weight: 800;
    }

    .primary {
      background: linear-gradient(135deg, #7e5cc6, #b77dd1);
      color: #fff;
      border: none;
      font-size: 17px;
      padding: 16px 14px;
      border-radius: 20px;
      box-shadow: 0 12px 24px rgba(113, 82, 169, 0.26);
    }

    .primary:hover {
      box-shadow: 0 16px 28px rgba(113, 82, 169, 0.30);
    }

    .secondary {
      background: linear-gradient(180deg, #fff8e8, #f1e3c4);
      color: #7a5724;
      border-color: #d9c193;
    }

    .danger {
      background: linear-gradient(180deg, #fff1ef, #f8dede);
      color: #a74b4b;
      border-color: #e0b5b5;
    }

    .genre-dongyo { background: linear-gradient(180deg, #fff3bf, #ffe692); }
    .genre-7080 { background: linear-gradient(180deg, #f3e0c7, #e8cfae); }
    .genre-trot { background: linear-gradient(180deg, #ffd9aa, #ffc578); }
    .genre-oldpop { background: linear-gradient(180deg, #ead8cc, #d9bfaf); }
    .genre-kpop { background: linear-gradient(180deg, #edd4f2, #ddb4e6); }
    .genre-bandpop { background: linear-gradient(180deg, #e5efff, #cfdfff); }
    .genre-gagok { background: linear-gradient(180deg, #ffdce7, #f4bacd); }
    .genre-gayageum { background: linear-gradient(180deg, #e2f2de, #cbe6c3); }

    @media (max-width: 520px) {
      .top-card h1 {
        font-size: 22px;
      }

      h2 {
        font-size: 18px;
      }

      button,
      textarea {
        font-size: 15px;
      }
    }

    @media (max-width: 380px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <section class="top-card">
      <h1>3주차 노래선물상자</h1>
      <p>기분과 이야기를 고르면, 나만의 노래를 만드는 음악 프롬프트가 나와요</p>
    </section>

    <!-- 1 -->
    <section class="question-block">
      <div class="question-number">1</div>
      <h2>🎵 오늘 기분은 어떠세요?</h2>

      <div class="grid-2" id="moodButtons">
        <button type="button" onclick="selectMood('기뻐요', this)">🎵 😊 기뻐요</button>
        <button type="button" onclick="selectMood('행복해요', this)">🎶 🌷 행복해요</button>
        <button type="button" onclick="selectMood('편안해요', this)">🎼 😌 편안해요</button>
        <button type="button" onclick="selectMood('속상해요', this)">♪ 😔 속상해요</button>
        <button type="button" onclick="selectMood('그리워요', this)">♫ 🍂 그리워요</button>
        <button type="button" onclick="selectMood('힘이 나요', this)">🎵 💪 힘이 나요</button>
      </div>

      <textarea id="moodEtc" placeholder="예: 설레요 / 감사해요 / 외로워요"></textarea>

      <div class="tool-row">
        <button type="button" onclick="toggleVoiceInput('moodEtc', this)">🎤</button>
        <button type="button" onclick="clearMoodField()">🧽</button>
        <button type="button" onclick="fillMoodExample()">✏️</button>
      </div>
    </section>

    <!-- 2 -->
    <section class="question-block">
      <div class="question-number">2</div>
      <h2>✍️ 오늘은 무슨 일이 있으셨나요?</h2>

      <div class="grid-2" id="reasonExampleButtons">
        <button type="button" onclick="selectReasonExample('손주를 만나서', this)">🎵 손주를 만나서</button>
        <button type="button" onclick="selectReasonExample('가족 생각이 나서', this)">🎶 가족 생각이 나서</button>
        <button type="button" onclick="selectReasonExample('옛날 생각이 나서', this)">🎼 옛날 생각이 나서</button>
        <button type="button" onclick="selectReasonExample('좋은 일이 있어서', this)">♪ 좋은 일이 있어서</button>
      </div>

      <textarea id="reasonInput" placeholder="예: 오늘 마음에 남는 일이 있었어요"></textarea>

      <div class="tool-row">
        <button type="button" onclick="toggleVoiceInput('reasonInput', this)">🎤</button>
        <button type="button" onclick="clearReasonField()">🧽</button>
        <button type="button" onclick="fillReasonExample()">✏️</button>
      </div>
    </section>

    <!-- 3 -->
    <section class="question-block">
      <div class="question-number">3</div>
      <h2>🎹 어떤 음악으로 만들까요?</h2>

      <div class="stack" id="typeButtons">
        <button type="button" onclick="typeSel('노래', this)">🎤 노래</button>
        <button type="button" onclick="typeSel('연주곡', this)">🎹 연주곡</button>
      </div>

      <div class="sub-card hidden" id="instrumentBlock">
        <div class="sub-number">3-1</div>
        <h3>🎼 어떤 악기가 좋으세요?</h3>
        <div class="grid-2" id="instrumentButtons">
          <button type="button" onclick="setExtraOption('피아노', this, 'instrumentButtons')">🎹 피아노</button>
          <button type="button" onclick="setExtraOption('기타', this, 'instrumentButtons')">🎸 기타</button>
          <button type="button" onclick="setExtraOption('바이올린', this, 'instrumentButtons')">🎻 바이올린</button>
          <button type="button" onclick="setExtraOption('가야금', this, 'instrumentButtons')">🪕 가야금</button>
        </div>
      </div>
    </section>

    <!-- 4 -->
    <section class="question-block">
      <div class="question-number">4</div>
      <h2>💿 어떤 음악 종류가 좋으세요?</h2>

      <div class="grid-2" id="genreButtons">
        <button class="genre-dongyo" type="button" onclick="setGenre('어린이 동요', this)">🎵 어린이 동요</button>
        <button class="genre-7080" type="button" onclick="setGenre('추억의 7080 가요', this)">📻 추억의 7080 가요</button>
        <button class="genre-trot" type="button" onclick="setGenre('신나는 트로트', this)">💃 신나는 트로트</button>
        <button class="genre-oldpop" type="button" onclick="setGenre('비틀즈풍 영국 팝', this)">🇬🇧 비틀즈풍 영국 팝</button>
        <button class="genre-kpop" type="button" onclick="setGenre('아이돌 K-POP', this)">👥 아이돌 K-POP</button>
        <button class="genre-bandpop" type="button" onclick="setGenre('맑고 감성적인 밴드팝', this)">🎸 감성 밴드팝</button>
        <button class="genre-gagok" type="button" onclick="setGenre('감성 클래식 가곡', this)">🎼 감성 클래식 가곡</button>
        <button class="genre-gayageum" type="button" onclick="setGenre('전통 가야금 연주', this)">🪕 전통 가야금 연주</button>
      </div>
    </section>

    <!-- 4-1 -->
    <section class="question-block">
      <div class="question-number">4-1</div>
      <h2>⭐ 좋아하는 가수가 있으면 적어보세요</h2>

      <textarea id="artistInput" placeholder="예: 임영웅 / 나훈아 / 조용필 / 아이유"></textarea>

      <div class="tool-row">
        <button type="button" onclick="toggleVoiceInput('artistInput', this)">🎤</button>
        <button type="button" onclick="clearArtist()">🧽</button>
        <button type="button" onclick="fillArtistExample()">✏️</button>
      </div>
    </section>

    <!-- 5 -->
    <section class="question-block">
      <div class="question-number">5</div>
      <h2>🎶 어떤 느낌의 노래가 좋으세요?</h2>

      <div class="grid-2" id="atmosphereButtons">
        <button type="button" onclick="setAtmosphere('신나고 즐거운', this)">🎵 신나고 즐거운</button>
        <button type="button" onclick="setAtmosphere('조용하고 차분한', this)">🎼 조용하고 차분한</button>
        <button type="button" onclick="setAtmosphere('따뜻하고 포근한', this)">🎶 따뜻하고 포근한</button>
        <button type="button" onclick="setAtmosphere('힘차고 희망찬', this)">♪ 힘차고 희망찬</button>
        <button type="button" onclick="setAtmosphere('감성적이고 그리운', this)">♫ 감성적이고 그리운</button>
        <button type="button" onclick="setAtmosphere('웅장하고 감동적인', this)">🎼 웅장하고 감동적인</button>
      </div>
    </section>

    <!-- 마지막 -->
    <section class="question-block">
      <button type="button" class="primary" onclick="buildPrompt()">🎼 나의 노래 프롬프트 만들기</button>

      <textarea id="promptOutput" class="result-box" placeholder="여기에 제미나이에 넣을 나의 노래 프롬프트가 나옵니다"></textarea>

      <div class="main-buttons">
        <button type="button" class="secondary" onclick="copyPrompt()">📋 프롬프트 복사하기</button>
        <button type="button" class="secondary" onclick="copyAndOpenGemini()">🎵 복사하고 재미나이 열기</button>
        <button type="button" class="danger" onclick="clearAll()">🧹 처음부터 다시 만들기</button>
      </div>
    </section>

  </div>

  <script>
    const state = {
      mood: "",
      reason: "",
      musicType: "",
      extraOption: "",
      genre: "",
      atmosphere: ""
    };

    function clearActive(selector) {
      document.querySelectorAll(selector).forEach(btn => btn.classList.remove("active"));
    }

    function selectMood(mood, btn) {
      state.mood = mood;
      clearActive("#moodButtons button");
      btn.classList.add("active");
      document.getElementById("moodEtc").value = "";
    }

    function selectReasonExample(text, btn) {
      state.reason = text;
      clearActive("#reasonExampleButtons button");
      btn.classList.add("active");
      document.getElementById("reasonInput").value = text;
    }

    function fillMoodExample() {
      const examples = ["설레요", "감사해요", "외로워요"];
      const text = examples[Math.floor(Math.random() * examples.length)];
      document.getElementById("moodEtc").value = text;
      state.mood = text;
      clearActive("#moodButtons button");
    }

    function fillReasonExample() {
      const examples = [
        "오늘 마음에 남는 일이 있었어요",
        "가족 생각이 많이 났어요",
        "좋은 일이 있어서 기분이 좋았어요",
        "옛날 생각이 많이 났어요"
      ];
      const text = examples[Math.floor(Math.random() * examples.length)];
      document.getElementById("reasonInput").value = text;
      state.reason = text;
      clearActive("#reasonExampleButtons button");
    }

    function clearMoodField() {
      document.getElementById("moodEtc").value = "";
    }

    function clearReasonField() {
      document.getElementById("reasonInput").value = "";
      clearActive("#reasonExampleButtons button");
    }

    function clearArtist() {
      document.getElementById("artistInput").value = "";
    }

    function fillArtistExample() {
      const examples = ["임영웅", "나훈아", "조용필", "아이유"];
      const pick = examples[Math.floor(Math.random() * examples.length)];
      document.getElementById("artistInput").value = pick;
    }

    function typeSel(type, btn) {
      state.musicType = type;
      clearActive("#typeButtons button");
      btn.classList.add("active");

      clearActive("#instrumentButtons button");

      const instrumentBlock = document.getElementById("instrumentBlock");

      if (type === "노래") {
        instrumentBlock.classList.add("hidden");
        state.extraOption = "";
      } else {
        instrumentBlock.classList.remove("hidden");
        state.extraOption = "피아노";

        const defaultInst = document.querySelector("#instrumentButtons button:nth-child(1)");
        if (defaultInst) defaultInst.classList.add("active");

        setTimeout(() => {
          instrumentBlock.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 120);
      }
    }

    function setExtraOption(value, btn, groupId) {
      state.extraOption = value;
      clearActive(`#${groupId} button`);
      btn.classList.add("active");
    }

    function setGenre(genre, btn) {
      state.genre = genre;
      clearActive("#genreButtons button");
      btn.classList.add("active");
    }

    function setAtmosphere(value, btn) {
      state.atmosphere = value;
      clearActive("#atmosphereButtons button");
      btn.classList.add("active");
    }

    function inferMood() {
      const customMood = document.getElementById("moodEtc").value.trim();
      return customMood || state.mood || "편안해요";
    }

    function inferReason() {
      const customReason = document.getElementById("reasonInput").value.trim();
      return customReason || state.reason || "오늘 마음에 남은 일이 있었어요";
    }

    function refineMood(mood) {
      const map = {
        "기뻐요": "밝고 기쁜 마음에서",
        "행복해요": "마음이 환하고 행복한 느낌에서",
        "편안해요": "편안하고 안정된 마음에서",
        "속상해요": "마음 한편이 살짝 무겁고 속상한 느낌에서",
        "그리워요": "그리운 마음이 조용히 번지는 느낌에서",
        "힘이 나요": "활기차고 에너지가 느껴지는 마음에서"
      };
      return map[mood] || `${mood} 마음에서`;
    }

    function refineReason(reason) {
      if (reason.includes("손주")) return "손주를 떠올리며 느끼는 따뜻한 감정이 자연스럽게 이어지도록";
      if (reason.includes("가족")) return "가족을 생각하며 느끼는 마음이 자연스럽게 이어지도록";
      if (reason.includes("옛날") || reason.includes("추억")) return "지나간 추억이 조용히 떠오르는 느낌이 자연스럽게 이어지도록";
      if (reason.includes("보고 싶은")) return "그리운 사람을 떠올리는 감정이 자연스럽게 이어지도록";
      if (reason.includes("피곤")) return "지친 마음이 편안하게 쉬어갈 수 있도록";
      return `${reason}의 감정과 이야기가 자연스럽게 이어지도록`;
    }

    function getGenreStyle(genre) {
      switch (genre) {
        case "어린이 동요":
          return `
- 멜로디는 단순하고 따라 부르기 쉽게
- 리듬은 밝고 경쾌하게
- 어린아이도 이해할 수 있는 쉬운 가사
- 반복 구간이 있어 기억에 남도록`;

        case "추억의 7080 가요":
          return `
- 템포는 중간 또는 느림
- 옛 감성이 느껴지는 따뜻한 멜로디
- 서정적이고 부드러운 진행
- 약간의 향수를 자극하는 느낌`;

        case "신나는 트로트":
          return `
- 템포는 중간~빠름 느낌
- 리듬감 있고 흥이 나도록
- 꺾기 창법 느낌 살리기
- 반복되는 후렴으로 기억에 남게`;

        case "비틀즈풍 영국 팝":
          return `
- 영국 밴드 느낌의 빈티지한 팝 스타일
- 클래식 밴드 구성 느낌
- 부드럽고 선명한 멜로디
- 비틀즈처럼 따뜻하고 기억에 남는 흐름`;

        case "아이돌 K-POP":
          return `
- 세련되고 현대적인 사운드
- 리듬감 있고 중독성 있는 멜로디
- 후렴이 강하게 기억되도록 구성
- 비트 중심의 현대적인 흐름`;

        case "맑고 감성적인 밴드팝":
          return `
- 맑고 담백한 보컬 느낌
- 밴드 중심의 자연스러운 편곡
- 밝으면서도 감성적인 멜로디
- 너무 과하지 않고 세련된 흐름`;

        case "감성 클래식 가곡":
          return `
- 서정적이고 감정이 깊게 전달되도록
- 클래식한 성악 스타일
- 호흡과 흐름을 길게 가져가기
- 감정이 점진적으로 깊어지도록`;

        case "전통 가야금 연주":
          return `
- 전통적인 한국 음악 느낌
- 여백과 여운을 살린 연주
- 느리고 부드러운 흐름
- 멜로디가 자연스럽게 흘러가도록`;

        default:
          return `
- 자연스럽고 듣기 편한 음악`;
      }
    }

    function getMoodStyle(atmosphere) {
      switch (atmosphere) {
        case "신나고 즐거운":
          return "- 전체적으로 밝고 경쾌한 분위기로 구성해 주세요.";
        case "조용하고 차분한":
          return "- 전체적으로 조용하고 편안하게 흐르도록 구성해 주세요.";
        case "따뜻하고 포근한":
          return "- 마음이 따뜻해지는 부드러운 분위기로 만들어 주세요.";
        case "힘차고 희망찬":
          return "- 힘이 나고 희망이 느껴지도록 구성해 주세요.";
        case "감성적이고 그리운":
          return "- 추억과 그리움이 자연스럽게 느껴지도록 만들어 주세요.";
        case "웅장하고 감동적인":
          return "- 스케일이 크고 감동이 느껴지도록 구성해 주세요.";
        default:
          return "";
      }
    }

    function getArtistStyleForSong(artist) {
      if (artist.includes("임영웅")) {
        return `
- 부드럽고 따뜻한 보컬 흐름
- 감정이 점점 깊어지다가 후렴에서 크게 터지도록 구성
- 발라드와 트로트 감성이 자연스럽게 섞이도록
- 진심이 전달되는 느낌으로 멜로디와 가사를 구성`;
      } else if (artist.includes("나훈아")) {
        return `
- 강한 감정 전달과 무게감 있는 보컬
- 트로트 특유의 꺾기 창법 느낌
- 후렴이 강하게 반복되도록 구성`;
      } else if (artist.includes("이미자")) {
        return `
- 전통가요 특유의 깊고 애잔한 감정
- 느리고 서정적인 멜로디
- 절제된 표현으로 감정을 전달`;
      } else if (artist.includes("조용필")) {
        return `
- 대중적이면서 완성도 높은 멜로디
- 후렴이 크게 살아나는 구조
- 다양한 감정이 자연스럽게 흐르도록 구성`;
      } else if (artist.includes("장윤정")) {
        return `
- 밝고 경쾌한 트로트 리듬
- 따라 부르기 쉬운 멜로디
- 흥이 자연스럽게 올라가도록 구성`;
      } else if (artist.includes("아이유")) {
        return `
- 섬세하고 감성적인 멜로디
- 말하듯 자연스러운 가사 흐름
- 잔잔하지만 깊은 감정 전달`;
      } else if (artist.includes("악뮤") || artist.includes("AKMU")) {
        return `
- 담백하면서도 개성 있는 멜로디
- 맑고 밝은 감성의 밴드 스타일
- 과하지 않은 편곡과 기억에 남는 후렴`;
      }
      return "";
    }

    function getArtistStyleForInstrumental(artist) {
      if (artist.includes("임영웅")) {
        return `
- 따뜻하고 진심 어린 감정선이 느껴지도록 구성
- 부드럽고 서정적인 멜로디 흐름
- 감정이 점점 깊어지도록 전개`;
      } else if (artist.includes("나훈아")) {
        return `
- 강한 에너지와 무게감이 느껴지도록 구성
- 힘 있는 멜로디 진행
- 후반으로 갈수록 감정이 크게 살아나도록 구성`;
      } else if (artist.includes("이미자")) {
        return `
- 애잔하고 깊은 정서가 느껴지도록 구성
- 느리고 서정적인 멜로디
- 절제된 감정 표현`;
      } else if (artist.includes("조용필")) {
        return `
- 대중적이고 완성도 높은 멜로디
- 넓은 감정선이 자연스럽게 흐르도록 구성
- 인상적인 중심 멜로디가 살아나도록 구성`;
      } else if (artist.includes("장윤정")) {
        return `
- 밝고 경쾌한 리듬감
- 쉽고 귀에 들어오는 멜로디
- 흥이 자연스럽게 살아나도록 구성`;
      } else if (artist.includes("아이유")) {
        return `
- 섬세하고 감성적인 분위기
- 잔잔하지만 깊이 있는 멜로디
- 부드럽고 맑은 느낌의 편곡`;
      } else if (artist.includes("악뮤") || artist.includes("AKMU")) {
        return `
- 담백하면서도 개성 있는 멜로디
- 맑고 산뜻한 밴드 감성
- 과하지 않고 세련된 편곡`;
      }
      return "";
    }

    function buildPrompt() {
      const mood = inferMood();
      const reason = inferReason();
      const artist = document.getElementById("artistInput").value.trim();
      const musicType = state.musicType || "노래";
      const genre = state.genre || "추억의 7080 가요";
      const extra = state.extraOption || "피아노";

      const refinedMood = refineMood(mood);
      const refinedReason = refineReason(reason);
      const genreStyle = getGenreStyle(genre);
      const moodStyle = getMoodStyle(state.atmosphere);
      const artistStyle = musicType === "연주곡"
        ? getArtistStyleForInstrumental(artist)
        : getArtistStyleForSong(artist);

      let prompt = "";

      if (musicType === "연주곡") {
        prompt = `당신은 사람의 마음을 음악으로 표현하는 작곡가입니다.

${refinedMood} 시작하는 ${genre} 스타일의 연주곡을 만들어 주세요.

${refinedReason}

전체 분위기는 "${state.atmosphere || "따뜻하고 포근한"}" 느낌으로 유지해 주세요.

${artist ? `${artist}의 분위기와 감성을 참고하되, 특정 곡을 그대로 따라하지 말고 새로운 음악으로 만들어 주세요.

좋아하는 가수가 입력된 경우,
음악의 전체 스타일과 분위기는 해당 가수의 스타일을 가장 우선으로 반영해 주세요.
다른 요소들은 그 가수 스타일 안에서 자연스럽게 어울리도록 조정해 주세요.

특정 가수의 기존 곡을 그대로 따라하지 말고,
그 가수의 감성과 특징만 참고하여 새로운 음악으로 만들어 주세요.` : ""}
${artistStyle}

${genreStyle}
${moodStyle}

멜로디와 반주가 함께 풍부하게 들리도록 구성해 주세요.
전체 곡이 하나의 이야기처럼 부드럽게 이어지게 해 주세요.
중심 악기는 ${extra}로 해 주세요.

반드시 가사 없이 순수 연주곡으로 만들어 주세요.
사람 목소리, 허밍, 코러스 없이 악기 연주만 나오게 해 주세요.

마지막은 따뜻한 느낌으로 마무리해 주세요.`;
      } else {
        prompt = `당신은 사람의 마음을 음악으로 표현하는 작곡가입니다.

${refinedMood} 시작하는 ${genre} 스타일의 노래를 만들어 주세요.

${refinedReason}

전체 분위기는 "${state.atmosphere || "따뜻하고 포근한"}" 느낌으로 유지해 주세요.

${artist ? `${artist}의 분위기와 감성을 참고하되, 특정 곡을 그대로 따라하지 말고 새로운 음악으로 만들어 주세요.

좋아하는 가수가 입력된 경우,
음악의 전체 스타일과 분위기는 해당 가수의 스타일을 가장 우선으로 반영해 주세요.
다른 요소들은 그 가수 스타일 안에서 자연스럽게 어울리도록 조정해 주세요.

특정 가수의 기존 곡을 그대로 따라하지 말고,
그 가수의 감성과 특징만 참고하여 새로운 음악으로 만들어 주세요.` : ""}
${artistStyle}

${genreStyle}
${moodStyle}

멜로디는 자연스럽고 기억에 남도록,
후렴은 반복되며 쉽게 따라 부를 수 있도록 만들어 주세요.

전체 곡이 하나의 이야기처럼 부드럽게 이어지게 해 주세요.
마지막은 따뜻한 느낌으로 마무리해 주세요.

가사와 후렴이 있는 노래 형식으로 자연스럽게 만들어 주세요.
각 구절은 짧고 쉽게 따라 부를 수 있게 만들어 주세요.`;
      }

      document.getElementById("promptOutput").value = prompt;
    }

    function copyPrompt() {
      const text = document.getElementById("promptOutput").value.trim();
      if (!text) {
        alert("먼저 노래 프롬프트 만들기를 눌러주세요.");
        return;
      }

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
          alert("복사했어요 😊");
        }).catch(() => fallbackCopy());
      } else {
        fallbackCopy();
      }
    }

    function copyAndOpenGemini() {
      const text = document.getElementById("promptOutput").value.trim();

      if (!text) {
        alert("먼저 노래 프롬프트 만들기를 눌러주세요.");
        return;
      }

      const openGemini = () => {
        window.location.href = "https://gemini.google.com/";
      };

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(() => {
            openGemini();
          })
          .catch(() => {
            fallbackCopy(false);
            openGemini();
          });
      } else {
        fallbackCopy(false);
        openGemini();
      }
    }

    function fallbackCopy(showAlert = true) {
      const output = document.getElementById("promptOutput");
      output.focus();
      output.select();
      output.setSelectionRange(0, 99999);

      try {
        const ok = document.execCommand("copy");
        if (showAlert) alert("복사했어요 😊");
        if (!ok) throw new Error("copy failed");
      } catch (e) {
        alert("복사가 잘 안 되면 글을 길게 눌러 복사해 주세요.");
      }
    }

    let recognition = null;
    let isRecording = false;
    let currentButton = null;
    let currentFieldId = null;

    function toggleVoiceInput(fieldId, btn) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert("이 기기에서는 음성입력이 지원되지 않아요.");
        return;
      }

      if (isRecording) {
        if (currentFieldId === fieldId) {
          recognition.stop();
          return;
        } else {
          recognition.stop();
          setTimeout(() => toggleVoiceInput(fieldId, btn), 200);
          return;
        }
      }

      recognition = new SpeechRecognition();
      recognition.lang = "ko-KR";
      recognition.interimResults = true;
      recognition.continuous = true;

      currentButton = btn;
      currentFieldId = fieldId;
      const field = document.getElementById(fieldId);
      let baseText = field.value ? field.value + " " : "";

      isRecording = true;
      btn.textContent = "🔴";
      btn.classList.add("recording");

      recognition.onresult = function(event) {
        let transcript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        field.value = (baseText + transcript).trim();
      };

      recognition.onend = resetRecording;
      recognition.onerror = resetRecording;
      recognition.start();
    }

    function resetRecording() {
      if (currentButton) {
        currentButton.textContent = "🎤";
        currentButton.classList.remove("recording");
      }
      recognition = null;
      isRecording = false;
      currentButton = null;
      currentFieldId = null;
    }

    function clearAll() {
      if (recognition && isRecording) recognition.stop();

      document.getElementById("moodEtc").value = "";
      document.getElementById("reasonInput").value = "";
      document.getElementById("artistInput").value = "";
      document.getElementById("promptOutput").value = "";

      clearActive("#moodButtons button");
      clearActive("#reasonExampleButtons button");
      clearActive("#typeButtons button");
      clearActive("#instrumentButtons button");
      clearActive("#genreButtons button");
      clearActive("#atmosphereButtons button");

      document.getElementById("instrumentBlock").classList.add("hidden");

      state.mood = "";
      state.reason = "";
      state.musicType = "";
      state.extraOption = "";
      state.genre = "";
      state.atmosphere = "";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>
