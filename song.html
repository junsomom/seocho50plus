<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음이 만드는 나의 노래</title>

<style>
body { font-family: sans-serif; background:#f6f7fb; margin:0; }
.wrap { max-width:700px; margin:auto; padding:10px; }

.top {
  background:#6c8cff;
  color:white;
  padding:12px;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
}

.block {
  background:white;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
}

button {
  width:100%;
  padding:12px;
  margin:4px 0;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:15px;
}

.active {
  background:#eef4ff;
  border:2px solid #4a7cff;
}

textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:6px;
}

.primary {
  background:#4a7cff;
  color:white;
  border:none;
}
</style>
</head>

<body>
<div class="wrap">

<div class="top">마음이 만드는 나의 노래</div>

<!-- 1 기분 -->
<div class="block">
<b>1. 오늘 기분은?</b>
<button onclick="setMood('기뻐요', this)">😊 기뻐요</button>
<button onclick="setMood('속상해요', this)">😔 속상해요</button>
<button onclick="setMood('편안해요', this)">😌 편안해요</button>
<button onclick="setMood('그리워요', this)">🍂 그리워요</button>
<textarea id="moodEtc" placeholder="기타"></textarea>
</div>

<!-- 2 이유 -->
<div class="block">
<b>2. 오늘은 무슨 일이 있었나요?</b>
<textarea id="reason"></textarea>
</div>

<!-- 3 장르 -->
<div class="block">
<b>3. 음악 스타일</b>
<button onclick="setGenre('트로트', this)">💃 트로트</button>
<button onclick="setGenre('7080 가요', this)">📻 7080</button>
<button onclick="setGenre('K-POP', this)">👥 K-POP</button>
<button onclick="setGenre('밴드팝', this)">🎸 밴드팝</button>
<button onclick="setGenre('찬송가·CCM', this)">⛪ CCM</button>
</div>

<!-- 4 분위기 -->
<div class="block">
<b>4. 분위기</b>
<button onclick="setAtmos('밝고 즐거운', this)">😊 밝음</button>
<button onclick="setAtmos('차분한', this)">😌 차분</button>
<button onclick="setAtmos('감성적인', this)">🌙 감성</button>
<button onclick="setAtmos('웅장한', this)">👑 웅장</button>
</div>

<!-- 4-1 가수 -->
<div class="block">
<b>좋아하는 가수</b>
<textarea id="artist" placeholder="예: 임영웅, 아이유"></textarea>
</div>

<!-- 생성 -->
<div class="block">
<button class="primary" onclick="makePrompt()">노래 만들기</button>
<textarea id="output" rows="12"></textarea>

<button onclick="copy()">복사</button>
<button onclick="openGemini()">👉 복사하고 제미나이 열기</button>
</div>

</div>

<script>

let state = {
  mood:"",
  genre:"",
  atmos:""
};

function clearActive(){
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
}

function setMood(m,b){
  state.mood=m;
  b.classList.add("active");
}

function setGenre(g,b){
  state.genre=g;
  b.classList.add("active");
}

function setAtmos(a,b){
  state.atmos=a;
  b.classList.add("active");
}

function makePrompt(){

  let mood = document.getElementById("moodEtc").value || state.mood;
  let reason = document.getElementById("reason").value;
  let artist = document.getElementById("artist").value;

  let artistStyle="";

  if(artist.includes("임영웅")){
    artistStyle="부드럽고 감정이 깊어지는 스타일";
  }
  else if(artist.includes("아이유")){
    artistStyle="섬세하고 감성적인 스타일";
  }

  let prompt = `
당신은 사람의 마음을 음악으로 표현하는 작곡가입니다.

${mood} 마음에서 시작하는 ${state.genre} 스타일의 노래를 만들어 주세요.

${reason}

전체 분위기는 ${state.atmos} 느낌으로 유지해 주세요.

${artist ? artist + "의 감성을 참고해 주세요." : ""}
${artistStyle}

멜로디는 자연스럽고 기억에 남게,
후렴은 반복되도록 만들어 주세요.

마지막은 따뜻하게 마무리해 주세요.

가사와 함께 노래 형식으로 만들어 주세요.
`;

  document.getElementById("output").value = prompt;
}

function copy(){
  let t=document.getElementById("output");
  t.select();
  document.execCommand("copy");
  alert("복사 완료");
}

function openGemini(){
  copy();
  window.location.href="https://gemini.google.com";
}

</script>
</body>
</html>
