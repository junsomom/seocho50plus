<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>노래 주머니 - 내 이야기를 노래로 만들기</title>
  <style>
    :root {
      --primary: #8a7cf0;
      --primary-dark: #6d5fd1;
      --light-bg: #f8f8fe;
      --card-bg: #ffffff;
      --soft-card: #faf9ff;
      --border-color: #ddd9fb;
      --text-main: #222;
      --text-sub: #666;
      --example-bg: #dff2d8;
      --example-active: #b8e6a5;
      --mic-bg: #ffe8bf;
      --mic-recording: #ef9a9a;
      --clear-bg: #edf1f4;
      --clear-text: #37474f;
      --prompt-btn: #ddd9ff;
      --open-btn: #c9efe6;
      --reset-btn: #ffd6de;
      --focus-ring: 0 0 0 4px rgba(138, 124, 240, 0.18);
      --done-bg: #e8f5e9;
      --done-text: #2e7d32;

      --genre-bg: #fff3cd;
      --voice-bg: #d8efff;
      --age-bg: #f6e1ff;

      --selected-shadow: 0 0 0 3px rgba(109, 95, 209, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--light-bg);
      color: var(--text-main);
      line-height: 1.6;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      text-align: center;
      padding: 16px 12px;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px;
    }

    .panel {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 27px;
      color: var(--primary-dark);
    }

    .panel p.desc {
      margin: 0 0 8px;
      font-size: 16px;
      color: var(--text-sub);
    }

    .guide-box {
      margin: 0 0 16px;
      background: #f0efff;
      color: #4f46b5;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
    }

    .question-card {
      background: var(--soft-card);
      border: 1px solid #e7e3ff;
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .question-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .question-title-text {
      flex: 1;
      min-width: 0;
    }

    .question-sub {
      margin-top: -2px;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--text-sub);
    }

    .completion-badge {
      display: none;
      flex-shrink: 0;
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--done-bg);
      color: var(--done-text);
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
    }

    .completion-badge.show {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .question-label {
      display: block;
      margin-bottom: 8px;
    }

    .answer-box {
      width: 100%;
      min-height: 78px;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      padding: 14px;
      font-size: 18px;
      resize: vertical;
      outline: none;
      background: #fff;
      color: #111;
    }

    .answer-box:focus {
      border-color: var(--primary);
      box-shadow: var(--focus-ring);
    }

    .answer-box::placeholder {
      color: #b8b8b8;
      opacity: 1;
    }

    button:focus-visible,
    textarea:focus-visible,
    input:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    .answer-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .mini-btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      min-height: 52px;
      padding: 12px 8px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 9px rgba(0, 0, 0, 0.08);
      transition: 0.2s ease;
    }

    .mini-btn.mic-btn {
      background: var(--mic-bg);
      color: #6d4c41;
    }

    .mini-btn.mic-btn.recording {
      background: var(--mic-recording);
      color: #fff;
      animation: pulse 1s infinite;
    }

    .mini-btn.clear-btn {
      background: var(--clear-bg);
      color: var(--clear-text);
    }

    .mini-btn.example-btn {
      background: var(--example-bg);
      color: #33691e;
    }

    .mini-btn.example-btn.active {
      background: var(--example-active);
      color: #1b5e20;
    }

    .status {
      margin-top: 6px;
      font-size: 14px;
      color: var(--text-sub);
      min-height: 20px;
    }

    .choice-section {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .choice-card {
      background: var(--soft-card);
      border: 1px solid #e7e3ff;
      border-radius: 20px;
      padding: 14px;
    }

    .choice-card.genre {
      background: linear-gradient(180deg, #fffaf0, #fffef8);
    }

    .choice-card.voice {
      background: linear-gradient(180deg, #f3fbff, #fcfeff);
    }

    .choice-card.age {
      background: linear-gradient(180deg, #fcf6ff, #fffafe);
    }

    .choice-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .choice-options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .choice-btn {
      border: none;
      border-radius: 14px;
      min-height: 52px;
      padding: 12px 10px;
      font-size: 17px;
      font-weight: 800;
      text-align: center;
      background: #edf1f6;
      color: #37474f;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
      transition: 0.18s ease;
    }

    .choice-card.genre .choice-btn {
      background: var(--genre-bg);
      color: #7a5600;
    }

    .choice-card.voice .choice-btn {
      background: var(--voice-bg);
      color: #0b5e87;
    }

    .choice-card.age .choice-btn {
      background: var(--age-bg);
      color: #7b1fa2;
    }

    .choice-btn.selected {
      transform: translateY(-1px);
      box-shadow: var(--selected-shadow);
      filter: saturate(1.05);
    }

    .tool-section {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tool-btn {
      border: none;
      border-radius: 18px;
      min-height: 58px;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    .tool-btn.prompt {
      background: var(--prompt-btn);
      color: #3d32a8;
    }

    .tool-btn.open {
      background: var(--open-btn);
      color: #00695c;
    }

    .tool-btn.reset {
      background: var(--reset-btn);
      color: #880e4f;
    }

    .output-title {
      margin-top: 14px;
      margin-bottom: 8px;
      font-size: 20px;
      font-weight: 800;
      color: var(--primary-dark);
    }

    .output-box {
      width: 100%;
      min-height: 290px;
      border: 2px solid var(--border-color);
      border-radius: 18px;
      padding: 14px;
      font-size: 17px;
      background: #fff;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }

    .save-indicator {
      font-size: 13px;
      color: var(--primary-dark);
      min-height: 18px;
      text-align: right;
      margin-top: 4px;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @media (min-width: 720px) {
      .choice-options.genre-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .choice-options.voice-grid,
      .choice-options.age-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 640px) {
      header {
        font-size: 20px;
        padding: 14px 10px;
      }

      .panel h2 {
        font-size: 24px;
      }

      .panel p.desc {
        font-size: 15px;
      }

      .guide-box {
        font-size: 14px;
      }

      .question-title {
        font-size: 17px;
      }

      .completion-badge {
        font-size: 12px;
        padding: 4px 7px;
      }

      .answer-box {
        font-size: 17px;
        min-height: 70px;
        padding: 13px;
      }

      .answer-actions {
        gap: 6px;
        margin-top: 8px;
      }

      .mini-btn {
        min-height: 48px;
        font-size: 15px;
        padding: 10px 6px;
      }

      .choice-title {
        font-size: 17px;
      }

      .choice-btn {
        min-height: 48px;
        font-size: 15px;
        padding: 10px 8px;
      }

      .tool-btn {
        min-height: 52px;
        font-size: 17px;
        padding: 12px 14px;
      }

      .output-box {
        font-size: 16px;
        min-height: 250px;
      }
    }
  </style>
</head>
<body>
  <header>🎵 노래 주머니</header>

  <div class="container">
    <section class="panel">
      <h2>내 이야기를 노래로 만들어요</h2>
      <p class="desc">질문에 답하고, 버튼을 누르면 재미나이에 넣을 음악 프롬프트가 만들어집니다.</p>
      <div class="guide-box">길게 쓰지 않아도 됩니다. 예시를 눌러 시작해도 되고, 말하기로 입력해도 됩니다 😊</div>

      <div id="questions-wrap"></div>

      <div class="choice-section">
        <div class="choice-card genre">
          <div class="choice-title">🎼 장르를 골라주세요</div>
          <div class="choice-options genre-grid">
            <button type="button" class="choice-btn selected" data-group="genre" data-value="트로트">🎤 트로트</button>
            <button type="button" class="choice-btn" data-group="genre" data-value="케이팝">🎧 케이팝</button>
            <button type="button" class="choice-btn" data-group="genre" data-value="올드팝">📻 올드팝</button>
            <button type="button" class="choice-btn" data-group="genre" data-value="클래식">🎻 클래식</button>
            <button type="button" class="choice-btn" data-group="genre" data-value="가곡">🌸 가곡</button>
          </div>
          <input type="hidden" id="genre" value="트로트" />
        </div>

        <div class="choice-card voice">
          <div class="choice-title">🎤 가수 목소리를 골라주세요</div>
          <div class="choice-options voice-grid">
            <button type="button" class="choice-btn selected" data-group="voiceGender" data-value="여자">👩 여자</button>
            <button type="button" class="choice-btn" data-group="voiceGender" data-value="남자">👨 남자</button>
            <button type="button" class="choice-btn" data-group="voiceGender" data-value="혼성">👫 혼성</button>
          </div>
          <input type="hidden" id="voiceGender" value="여자" />
        </div>

        <div class="choice-card age">
          <div class="choice-title">🕰 가수 나이대 느낌을 골라주세요</div>
          <div class="choice-options age-grid">
            <button type="button" class="choice-btn selected" data-group="voiceAge" data-value="젊은 목소리">✨ 젊은 목소리</button>
            <button type="button" class="choice-btn" data-group="voiceAge" data-value="중년 목소리">🌷 중년 목소리</button>
            <button type="button" class="choice-btn" data-group="voiceAge" data-value="노년 목소리">🌿 노년 목소리</button>
          </div>
          <input type="hidden" id="voiceAge" value="젊은 목소리" />
        </div>
      </div>

      <div id="saveIndicator" class="save-indicator" aria-live="polite"></div>
    </section>

    <div class="tool-section">
      <button class="tool-btn prompt" id="makePromptBtn" type="button">✨ 음악 프롬프트 생성하기</button>

      <div class="output-title">음악 프롬프트</div>
      <div id="compiledOutput" class="output-box" aria-live="polite"></div>

      <button class="tool-btn open" id="copyAndOpenBtn" type="button">📋✨ 복사하고 재미나이 열기</button>
      <button class="tool-btn reset" id="resetBtn" type="button">🗑 모두 지우기</button>
    </div>
  </div>

  <script>
    const GEM_URL = 'https://gemini.google.com/gem';
    const STORAGE_KEY = 'song_thought_pocket_v1';

    const questions = [
      {
        title: '이 노래는 누구 이야기인가요?',
        sub: '연애, 여행, 청춘, 가족, 인생 이야기 모두 괜찮아요',
        placeholder: '예: 남편과 처음 기차 타고 여행 갔던 내 청춘 이야기예요'
      },
      {
        title: '이 노래에서 가장 전하고 싶은 마음은 무엇인가요?',
        sub: '설렘, 그리움, 고마움, 대견함 같은 마음을 떠올려 보세요',
        placeholder: '예: 그때는 참 설레고 예뻤다는 마음을 담고 싶어요'
      },
      {
        title: '어떤 순간이나 장면이 떠오르시나요?',
        sub: '한 장면처럼 말하면 가사가 더 잘 만들어져요',
        placeholder: '예: 꽃무늬 원피스를 입고 바닷가에서 사진 찍던 순간이 떠올라요'
      },
      {
        title: '이 노래를 들으면 어떤 기분이었으면 좋겠나요?',
        sub: '노래를 듣는 사람이 느끼는 분위기를 정해보세요',
        placeholder: '예: 듣는 사람이 추억여행을 하는 것처럼 웃고 울었으면 좋겠어요'
      },
      {
        title: '이 노래를 누구에게 들려주고 싶나요?',
        sub: '가족, 손주, 친구, 젊은 시절의 나에게도 들려줄 수 있어요',
        placeholder: '예: 지금의 나와 젊은 날의 나에게 같이 들려주고 싶어요'
      }
    ];

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let activeRecognition = null;
    let activeMicButton = null;
    let saveIndicatorTimer = null;

    function showSaveIndicator(message = '자동 저장됨') {
      const el = document.getElementById('saveIndicator');
      el.textContent = message;
      if (saveIndicatorTimer) clearTimeout(saveIndicatorTimer);
      saveIndicatorTimer = setTimeout(() => {
        el.textContent = '';
      }, 1500);
    }

    function saveData() {
      try {
        const data = {};
        document.querySelectorAll('.answer-box').forEach(box => {
          data[box.id] = box.value;
        });

        data.genre = document.getElementById('genre')?.value || '트로트';
        data.voiceGender = document.getElementById('voiceGender')?.value || '여자';
        data.voiceAge = document.getElementById('voiceAge')?.value || '젊은 목소리';
        data.compiledOutput = document.getElementById('compiledOutput')?.textContent || '';

        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        showSaveIndicator();
      } catch (error) {
        console.error('저장 실패:', error);
        showSaveIndicator('저장되지 않았어요');
      }
    }

    function debounce(fn, delay) {
      let timer = null;
      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    const saveDataDebounced = debounce(saveData, 500);

    function updateCompletionState(targetId) {
      const input = document.getElementById(targetId);
      if (!input) return;
      const num = targetId.replace('q', '');
      const badge = document.getElementById(`complete-${num}`);
      if (!badge) return;
      badge.classList.toggle('show', !!input.value.trim());
    }

    function updateAllCompletionStates() {
      for (let i = 1; i <= questions.length; i++) {
        updateCompletionState(`q${i}`);
      }
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          updateAllCompletionStates();
          return;
        }

        const data = JSON.parse(raw);

        Object.keys(data).forEach(id => {
          const el = document.getElementById(id);
          if (el && el.classList.contains('answer-box')) {
            el.value = data[id];
          }
        });

        if (data.genre) {
          document.getElementById('genre').value = data.genre;
          document.querySelectorAll('.choice-btn[data-group="genre"]').forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.value === data.genre);
          });
        }

        if (data.voiceGender) {
          document.getElementById('voiceGender').value = data.voiceGender;
          document.querySelectorAll('.choice-btn[data-group="voiceGender"]').forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.value === data.voiceGender);
          });
        }

        if (data.voiceAge) {
          document.getElementById('voiceAge').value = data.voiceAge;
          document.querySelectorAll('.choice-btn[data-group="voiceAge"]').forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.value === data.voiceAge);
          });
        }

        if (data.compiledOutput) {
          document.getElementById('compiledOutput').textContent = data.compiledOutput;
        }

        updateAllCompletionStates();
      } catch (error) {
        console.error('불러오기 실패:', error);
      }
    }

    function createQuestionCards() {
      const wrap = document.getElementById('questions-wrap');

      questions.forEach((question, index) => {
        const qNum = index + 1;
        const answerId = `q${qNum}`;
        const statusId = `status${qNum}`;

        const card = document.createElement('div');
        card.className = 'question-card';

        card.innerHTML = `
          <label class="question-label" for="${answerId}">
            <div class="question-title">
              <span class="question-title-text">${qNum}. ${question.title}</span>
              <span class="completion-badge" id="complete-${qNum}">완료</span>
            </div>
          </label>
          ${question.sub ? `<div class="question-sub">${question.sub}</div>` : ''}
          <textarea id="${answerId}" class="answer-box" placeholder="${question.placeholder}" aria-label="${question.title}"></textarea>
          <div class="answer-actions">
            <button class="mini-btn mic-btn" type="button" data-target="${answerId}" data-status="${statusId}">🎤 말하기</button>
            <button class="mini-btn clear-btn" type="button" data-target="${answerId}">🗑 지우기</button>
            <button class="mini-btn example-btn" type="button" data-target="${answerId}" data-example="${question.placeholder}">💡 예시</button>
          </div>
          <div class="status" id="${statusId}" aria-live="polite"></div>
        `;

        wrap.appendChild(card);
      });
    }

    function stopCurrentRecognition() {
      if (activeRecognition) {
        try {
          activeRecognition.stop();
        } catch (e) {
          console.error(e);
        }
      }
      if (activeMicButton) {
        activeMicButton.classList.remove('recording');
        activeMicButton.textContent = '🎤 말하기';
      }
      activeRecognition = null;
      activeMicButton = null;
    }

    function startVoiceInput(targetId, statusId, micButton) {
      const textarea = document.getElementById(targetId);
      const statusEl = document.getElementById(statusId);

      if (!textarea || !statusEl) return;

      if (!SpeechRecognition) {
        statusEl.textContent = '이 기기에서는 음성 입력이 지원되지 않습니다.';
        return;
      }

      if (activeMicButton === micButton && activeRecognition) {
        stopCurrentRecognition();
        return;
      }

      stopCurrentRecognition();

      const recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.continuous = false;

      let finalTranscript = '';
      let silenceTimer = null;
      const originalValue = textarea.value.trim();

      activeRecognition = recognition;
      activeMicButton = micButton;

      micButton.classList.add('recording');
      micButton.textContent = '⏹ 녹음중';
      statusEl.textContent = '녹음 중입니다.';

      recognition.onresult = function (event) {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const piece = event.results[i][0].transcript.trim();
          if (event.results[i].isFinal) {
            finalTranscript += (finalTranscript ? ' ' : '') + piece;
          } else {
            interimTranscript += (interimTranscript ? ' ' : '') + piece;
          }
        }

        textarea.value = [originalValue, finalTranscript, interimTranscript].filter(Boolean).join(' ');

        if (silenceTimer) clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
          try {
            recognition.stop();
          } catch (e) {
            console.error(e);
          }
        }, 1800);
      };

      recognition.onerror = function (event) {
        if (silenceTimer) clearTimeout(silenceTimer);
        let message = '음성 입력에 문제가 생겼습니다.';
        if (event.error === 'not-allowed') message = '마이크 권한을 허용해주세요.';
        if (event.error === 'no-speech') message = '말씀이 들리지 않았습니다. 다시 눌러주세요.';
        if (event.error === 'audio-capture') message = '마이크를 찾을 수 없습니다.';
        statusEl.textContent = message;
      };

      recognition.onend = function () {
        if (silenceTimer) clearTimeout(silenceTimer);
        textarea.value = textarea.value.trim();
        saveData();
        updateCompletionState(targetId);
        if (textarea.value) statusEl.textContent = '입력이 완료되었습니다.';
        if (activeMicButton === micButton) {
          micButton.classList.remove('recording');
          micButton.textContent = '🎤 말하기';
        }
        activeRecognition = null;
        activeMicButton = null;
      };

      try {
        recognition.start();
      } catch (error) {
        console.error('음성 인식 시작 실패:', error);
        statusEl.textContent = '음성 입력을 시작할 수 없습니다.';
      }
    }

    function clearAnswer(targetId) {
      const textarea = document.getElementById(targetId);
      if (!textarea) return;

      if (activeMicButton && activeMicButton.dataset.target === targetId) {
        stopCurrentRecognition();
      }

      textarea.value = '';

      document.querySelectorAll(`.example-btn[data-target="${targetId}"]`).forEach(btn => {
        btn.classList.remove('active');
      });

      saveData();
      updateCompletionState(targetId);
    }

    function setChoiceValue(group, value, buttonEl) {
      const hiddenInput = document.getElementById(group);
      if (!hiddenInput) return;

      hiddenInput.value = value;
      document.querySelectorAll(`.choice-btn[data-group="${group}"]`).forEach(btn => {
        btn.classList.remove('selected');
      });

      if (buttonEl) buttonEl.classList.add('selected');
      saveData();
    }

    function setupInteractions() {
      document.addEventListener('click', function (e) {
        const micButton = e.target.closest('.mic-btn');
        if (micButton) {
          startVoiceInput(micButton.dataset.target, micButton.dataset.status, micButton);
          return;
        }

        const clearBtn = e.target.closest('.clear-btn');
        if (clearBtn) {
          clearAnswer(clearBtn.dataset.target);
          return;
        }

        const exampleBtn = e.target.closest('.example-btn');
        if (exampleBtn) {
          const targetId = exampleBtn.dataset.target;
          const example = exampleBtn.dataset.example.replace('예: ', '');
          const textarea = document.getElementById(targetId);
          if (textarea) {
            textarea.value = example;
            exampleBtn.classList.add('active');
            saveData();
            updateCompletionState(targetId);
          }
          return;
        }

        const choiceBtn = e.target.closest('.choice-btn');
        if (choiceBtn) {
          setChoiceValue(choiceBtn.dataset.group, choiceBtn.dataset.value, choiceBtn);
          return;
        }
      });
    }

    function buildGenrePrompt(genre) {
      if (genre === '트로트') {
        return '트로트 느낌의 노래를 만들어 주세요.\n흥이 나고 따라 부르기 쉽게 만들어 주세요.\n후렴이 반복되게 해 주세요.';
      }
      if (genre === '케이팝') {
        return '케이팝 스타일의 노래를 만들어 주세요.\n밝고 리듬감 있게 만들어 주세요.\n기분이 좋아지는 느낌으로 해 주세요.';
      }
      if (genre === '올드팝') {
        return '올드팝 느낌의 노래를 만들어 주세요.\n추억이 느껴지고 부드럽게 만들어 주세요.';
      }
      if (genre === '클래식') {
        return '클래식 분위기의 음악으로 만들어 주세요.\n차분하고 우아한 느낌으로 만들어 주세요.';
      }
      if (genre === '가곡') {
        return '가곡 느낌의 노래를 만들어 주세요.\n서정적이고 아름답게 표현해 주세요.';
      }
      return '따뜻한 노래를 만들어 주세요.';
    }

    function buildVoicePrompt(voiceGender, voiceAge) {
      let genderText = '여자 목소리로';
      if (voiceGender === '남자') genderText = '남자 목소리로';
      if (voiceGender === '혼성') genderText = '혼성 보컬로';

      let ageText = '젊고 맑은 느낌으로';
      if (voiceAge === '중년 목소리') ageText = '편안하고 안정된 느낌으로';
      if (voiceAge === '노년 목소리') ageText = '깊고 따뜻한 느낌으로';

      return `${genderText}\n${ageText} 불러주세요.`;
    }

    function compilePrompt() {
      try {
        const output = document.getElementById('compiledOutput');
        output.textContent = '프롬프트를 만드는 중입니다...';

        const get = (n) => {
          const el = document.getElementById(`q${n}`);
          return el ? el.value.trim() : '';
        };

        const genre = document.getElementById('genre')?.value || '트로트';
        const voiceGender = document.getElementById('voiceGender')?.value || '여자';
        const voiceAge = document.getElementById('voiceAge')?.value || '젊은 목소리';

        const prompt = `위 이야기를 바탕으로 노래를 만들어 주세요.

[노래 이야기]
이 노래는 누구 이야기인가요: ${get(1) || '미입력'}
이 노래에서 가장 전하고 싶은 마음: ${get(2) || '미입력'}
떠오르는 순간이나 장면: ${get(3) || '미입력'}
이 노래를 들으면 좋을 기분: ${get(4) || '미입력'}
이 노래를 들려주고 싶은 사람: ${get(5) || '미입력'}

[장르]
${buildGenrePrompt(genre)}

[목소리]
${buildVoicePrompt(voiceGender, voiceAge)}

[추가 요청]
- 가사는 짧고 반복되게 만들어 주세요.
- 감정이 잘 느껴지게 써 주세요.
- 너무 어렵지 않게 써 주세요.
- 어르신도 따라 부르기 쉽게 만들어 주세요.
- 이야기와 감정이 살아 있는 노래로 만들어 주세요.`;

        output.textContent = prompt;
        saveData();
      } catch (error) {
        console.error('프롬프트 생성 실패:', error);
        document.getElementById('compiledOutput').textContent = '프롬프트 생성 중 오류가 생겼습니다.';
      }
    }

    async function copyAndOpenGem() {
      const text = document.getElementById('compiledOutput').textContent.trim();
      if (!text || text === '프롬프트를 만드는 중입니다...') {
        alert('먼저 음악 프롬프트 생성하기 버튼을 눌러주세요.');
        return;
      }

      saveData();

      let copied = false;

      try {
        await navigator.clipboard.writeText(text);
        copied = true;
      } catch (error) {
        console.error('복사 실패:', error);
      }

      const newWindow = window.open(GEM_URL, '_blank');

      if (!newWindow) {
        if (copied) {
          alert('복사는 되었지만 새 창이 차단되었어요. 브라우저 설정을 확인해주세요.');
        } else {
          alert('복사도 안 되고 새 창도 차단되었어요. 다시 눌러주세요.');
        }
        return;
      }

      if (copied) {
        alert('프롬프트를 복사했어요. 재미나이 화면에서 길게 눌러 붙여넣기 해주세요.');
      } else {
        alert('재미나이는 열렸지만 복사는 안 되었어요. 이 화면으로 돌아와 프롬프트를 직접 복사해주세요.');
      }
    }

    function resetAll() {
      if (!confirm('모든 내용을 지울까요?')) return;

      document.querySelectorAll('.answer-box').forEach(box => {
        box.value = '';
      });

      document.querySelectorAll('.example-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      document.getElementById('compiledOutput').textContent = '';

      document.getElementById('genre').value = '트로트';
      document.getElementById('voiceGender').value = '여자';
      document.getElementById('voiceAge').value = '젊은 목소리';

      document.querySelectorAll('.choice-btn[data-group="genre"]').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === '트로트');
      });
      document.querySelectorAll('.choice-btn[data-group="voiceGender"]').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === '여자');
      });
      document.querySelectorAll('.choice-btn[data-group="voiceAge"]').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === '젊은 목소리');
      });

      try {
        localStorage.removeItem(STORAGE_KEY);
      } catch (error) {
        console.error('저장 삭제 실패:', error);
      }

      stopCurrentRecognition();
      updateAllCompletionStates();
      showSaveIndicator('모두 지워졌어요');
    }

    function setupInputs() {
      document.addEventListener('input', function (e) {
        if (e.target.classList.contains('answer-box')) {
          document.querySelectorAll(`.example-btn[data-target="${e.target.id}"]`).forEach(btn => {
            btn.classList.remove('active');
          });

          saveDataDebounced();
          updateCompletionState(e.target.id);
        }
      });
    }

    createQuestionCards();
    setupInteractions();
    setupInputs();
    loadData();

    document.getElementById('makePromptBtn').addEventListener('click', compilePrompt);
    document.getElementById('copyAndOpenBtn').addEventListener('click', copyAndOpenGem);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
  </script>
</body>
</html>
