<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>서초50플러스 - AI 그림책 도우미</title>
<style>
* { box-sizing: border-box; }

:root{
    --green:#2e7d32;
    --green-border:#9ccc9c;
    --purple:#7e57c2;
    --bg:#f4f6f8;
    --card:#ffffff;
    --text:#1f2933;
    --sub:#52606d;
    --shadow:0 6px 18px rgba(0,0,0,0.08);
    --orange:#ef8f00;
    --blue:#1fa3e0;
    --gray:#a0a8b0;
    --disabled:#cfd8dc;
}

html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    -webkit-text-size-adjust: 100%;
}

body {
    line-height: 1.6;
}

.container {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    padding: 12px 14px 36px;
}

.tab-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 4px 0 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding-top: 6px;
    padding-bottom: 6px;
}

.tab-btn {
    min-height: 54px;
    padding: 12px 10px;
    font-size: 18px;
    font-weight: 800;
    border-radius: 18px;
    background: #d9dde1;
    color: #334155;
    border: none;
    text-align: center;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.tab-btn.active {
    background: var(--green);
    color: white;
    box-shadow: 0 4px 12px rgba(46,125,50,0.22);
}

.section-card {
    background: var(--card);
    border-radius: 22px;
    padding: 18px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
}

.label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 16px;
    margin-bottom: 8px;
}

.label-row label {
    margin: 0;
    flex: 1;
}

.example-mini-btn {
    flex: 0 0 auto;
    min-width: 64px;
    width: auto;
    margin-top: 0;
    padding: 8px 12px;
    font-size: 15px;
    font-weight: 800;
    border-radius: 12px;
    border: 2px solid var(--green-border);
    background: white;
    color: var(--green);
}

label {
    display: block;
    font-size: 19px;
    font-weight: 800;
    line-height: 1.5;
    color: var(--text);
}

.input-wrap {
    position: relative;
}

input, textarea {
    width: 100%;
    min-height: 58px;
    padding: 16px 66px 16px 16px;
    font-size: 19px;
    line-height: 1.6;
    border-radius: 18px;
    border: 2px solid var(--green-border);
    background: #fff;
    color: var(--text);
    outline: none;
}

textarea {
    min-height: 132px;
    resize: vertical;
}

input::placeholder,
textarea::placeholder {
    color: #9aa5b1;
}

input:focus,
textarea:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 4px rgba(46,125,50,0.10);
}

.mic-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border: none;
    border-radius: 999px;
    background: #eef2f5;
    font-size: 22px;
    cursor: pointer;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.textarea-wrap .mic-btn {
    top: 12px;
    transform: none;
}

.mic-btn.recording {
    background: #ff4d4d;
    color: white;
}

.mic-status {
    margin-top: 8px;
    min-height: 24px;
    font-size: 16px;
    color: var(--green);
    font-weight: 700;
}

.gender-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 6px;
}

.gender-btn {
    min-height: 54px;
    padding: 12px 10px;
    font-size: 18px;
    font-weight: 800;
    border-radius: 18px;
    border: 2px solid #cfd8df;
    background: white;
    text-align: center;
    cursor: pointer;
    user-select: none;
    display: flex;
    justify-content: center;
    align-items: center;
}

.gender-btn.active {
    background: var(--green);
    color: white;
    border-color: var(--green);
}

button, .link-btn {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 13px 14px;
    font-size: 18px;
    font-weight: 800;
    margin-top: 10px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.main-btn {
    background: var(--green);
    color: white;
}

.smart-btn {
    background: var(--purple);
    color: white;
}

.gray-btn {
    background: var(--gray);
    color: white;
}

.link-btn {
    background: var(--blue);
    color: white;
}

button:disabled {
    background: var(--disabled) !important;
    color: #6b7280 !important;
    cursor: not-allowed;
    box-shadow: none;
}

.notice-box {
    background: #eef7ff;
    border-radius: 18px;
    padding: 16px;
    font-size: 16px;
    line-height: 1.7;
    margin-top: 14px;
    color: #234;
}

.prompt-box {
    background: #fffef7;
    border: 2px solid #efe2a1;
    border-radius: 18px;
    padding: 14px;
    margin-top: 14px;
    font-size: 18px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
    min-height: 110px;
}

.result-box {
    background: #fffef8;
    border: 2px solid #efe6bc;
    border-radius: 14px;
    padding: 8px 10px;
    margin-top: 8px;
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
}

.box-header {
    font-size: 16px;
    font-weight: 900;
    margin-bottom: 4px;
    color: var(--green);
    line-height: 1.3;
}

.box-content {
    margin-bottom: 6px;
    line-height: 1.45;
}

.box-footer {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 2px;
}

.copy-box-btn,
.open-box-btn {
    margin-top: 0;
    width: 100%;
    padding: 8px 10px;
    font-size: 14px;
    border-radius: 12px;
    min-height: 40px;
}

.copy-box-btn {
    background: var(--orange);
    color: white;
}

.open-box-btn {
    background: var(--blue);
    color: white;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hidden {
    display: none;
}

.two-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
}

.bottom-reset {
    margin-top: 18px;
}

@media (max-width: 480px) {
    .container { padding: 10px 12px 30px; }
    .tab-btn { font-size: 17px; min-height: 52px; }
    .section-card { padding: 16px 14px; }
    label { font-size: 18px; }
    input, textarea { font-size: 18px; }
    button, .link-btn { font-size: 17px; padding: 12px 12px; }
    .prompt-box { font-size: 17px; }
    .result-box { font-size: 15px; padding: 8px 10px; }
    .box-header { font-size: 15px; }
    .copy-box-btn, .open-box-btn { font-size: 13px; padding: 8px 8px; min-height: 38px; }
    .example-mini-btn { font-size: 14px; min-width: 58px; }
}
</style>
</head>
<body>

<div class="container">
    <div class="tab-btns">
        <button id="tab1" class="tab-btn active" onclick="switchTab(1)">💡 생각주머니</button>
        <button id="tab2" class="tab-btn" onclick="switchTab(2)">📚 만들기상자</button>
    </div>

    <div id="tabContent1">
        <div class="section-card">

            <div class="label-row">
                <label for="userName">1. 성함이 어떻게 되시나요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('userName')">예시</button>
            </div>
            <div class="input-wrap">
                <input type="text" id="userName" placeholder="예: 김영자">
                <button type="button" class="mic-btn" onclick="startVoice('userName', this)" aria-label="성함 음성입력">🎤</button>
            </div>
            <div id="micStatusName" class="mic-status"></div>

            <div class="label-row">
                <label>2. 성별을 선택해주세요</label>
            </div>
            <div class="gender-btns">
                <button type="button" id="btn-female" class="gender-btn active" onclick="setGender('할머니','btn-female')">할머니</button>
                <button type="button" id="btn-male" class="gender-btn" onclick="setGender('할아버지','btn-male')">할아버지</button>
            </div>

            <div class="label-row">
                <label for="personality">3. 성격은 어떠신가요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('personality')">예시</button>
            </div>
            <div class="input-wrap">
                <input type="text" id="personality" placeholder="예: 따뜻하고 다정해요">
                <button type="button" class="mic-btn" onclick="startVoice('personality', this)" aria-label="성격 음성입력">🎤</button>
            </div>
            <div id="micStatusPersonality" class="mic-status"></div>

            <div class="label-row">
                <label for="childhood">4. 어린 시절 기억나는 장면은 무엇인가요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('childhood')">예시</button>
            </div>
            <div class="input-wrap">
                <input type="text" id="childhood" placeholder="예: 시골에서 친구들과 뛰어놀았어요">
                <button type="button" class="mic-btn" onclick="startVoice('childhood', this)" aria-label="어린 시절 음성입력">🎤</button>
            </div>
            <div id="micStatusChildhood" class="mic-status"></div>

            <div class="label-row">
                <label for="specialMoment">5. 가장 특별하거나 행복했던 순간은 언제였나요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('specialMoment')">예시</button>
            </div>
            <div class="input-wrap">
                <input type="text" id="specialMoment" placeholder="예: 손주가 태어났을 때">
                <button type="button" class="mic-btn" onclick="startVoice('specialMoment', this)" aria-label="특별한 순간 음성입력">🎤</button>
            </div>
            <div id="micStatusSpecialMoment" class="mic-status"></div>

            <div class="label-row">
                <label for="valuableThing">6. 지금 가장 소중하게 생각하는 것은 무엇인가요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('valuableThing')">예시</button>
            </div>
            <div class="input-wrap">
                <input type="text" id="valuableThing" placeholder="예: 가족과 건강">
                <button type="button" class="mic-btn" onclick="startVoice('valuableThing', this)" aria-label="소중한 것 음성입력">🎤</button>
            </div>
            <div id="micStatusValuableThing" class="mic-status"></div>

            <div class="label-row">
                <label for="futureWish">7. 앞으로 하고 싶은 일이나 바람은 무엇인가요?</label>
                <button type="button" class="example-mini-btn" onclick="fillOneExample('futureWish')">예시</button>
            </div>
            <div class="input-wrap textarea-wrap">
                <textarea id="futureWish" rows="4" placeholder="예: 건강하게 지내며 손주와 여행도 가고, 내 이야기를 책으로 남기고 싶어요"></textarea>
                <button type="button" class="mic-btn" onclick="startVoice('futureWish', this)" aria-label="앞으로의 바람 음성입력">🎤</button>
            </div>
            <div id="micStatusFutureWish" class="mic-status"></div>

            <button class="main-btn" onclick="generatePrompt()">👉 프롬프트 생성</button>

            <div class="notice-box">
                음성 입력은 휴대폰과 브라우저에 따라 다를 수 있습니다.<br>
                가장 안정적인 사용은 <b>크롬 브라우저</b>를 권장합니다.
            </div>

            <div id="promptPreview" class="prompt-box"></div>

            <button id="copyOpenBtn" class="smart-btn" onclick="copyPromptAndOpenChatGPT()" disabled>📋 프롬프트 복사 및 챗지피티 열기</button>

            <button class="gray-btn bottom-reset" onclick="resetThinkingTab()">모두 지우기</button>
        </div>
    </div>

    <div id="tabContent2" class="hidden">
        <div class="section-card">
            <label for="fullText">ChatGPT에서 나온 전체 텍스트를 여기에 붙여넣으세요</label>
            <textarea id="fullText" rows="10" placeholder="전체 텍스트 붙여넣기"></textarea>

            <div class="two-btns">
                <button class="main-btn" onclick="parseText()">📦 분류하기</button>
            </div>

            <div id="parsedOutput"></div>

            <button class="gray-btn bottom-reset" onclick="resetMakerTab()">모두 지우기</button>
        </div>
    </div>
</div>

<script>
let selectedGender = "할머니";
let currentRecognition = null;

const CHATGPT_URL = "https://chat.openai.com/";
const CANVA_URL = "https://www.canva.com/create/books/";
const FLOW_URL = "https://labs.google/fx/ko/tools/flow";

const STORAGE_KEYS = {
    userName: "storybook_userName",
    personality: "storybook_personality",
    childhood: "storybook_childhood",
    specialMoment: "storybook_specialMoment",
    valuableThing: "storybook_valuableThing",
    futureWish: "storybook_futureWish",
    fullText: "storybook_fullText",
    promptPreview: "storybook_promptPreview",
    selectedGender: "storybook_selectedGender",
    parsedOutput: "storybook_parsedOutput"
};

const EXAMPLE_VALUES = {
    userName: "김영자",
    personality: "따뜻하고 다정해요",
    childhood: "시골에서 친구들과 뛰어놀았어요",
    specialMoment: "손주가 태어났을 때",
    valuableThing: "가족과 건강",
    futureWish: "건강하게 지내며 손주와 여행도 가고, 내 이야기를 책으로 남기고 싶어요"
};

function switchTab(n){
    document.getElementById("tabContent1").classList.toggle("hidden", n !== 1);
    document.getElementById("tabContent2").classList.toggle("hidden", n !== 2);
    document.getElementById("tab1").classList.toggle("active", n === 1);
    document.getElementById("tab2").classList.toggle("active", n === 2);
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function setGender(g, btnId){
    selectedGender = g;
    document.querySelectorAll(".gender-btn").forEach(btn => btn.classList.remove("active"));
    document.getElementById(btnId).classList.add("active");
    saveToStorage(STORAGE_KEYS.selectedGender, selectedGender);
}

function fillOneExample(targetId){
    const el = document.getElementById(targetId);
    if(!el) return;
    el.value = EXAMPLE_VALUES[targetId] || "";
    triggerAutoSave(targetId);
}

function saveToStorage(key, value){
    try {
        localStorage.setItem(key, value);
    } catch(e) {}
}

function loadFromStorage(key){
    try {
        return localStorage.getItem(key) || "";
    } catch(e) {
        return "";
    }
}

async function copyText(text){
    if(!text) return false;

    if(navigator.clipboard && window.isSecureContext){
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch(e) {
            return fallbackCopy(text);
        }
    }
    return fallbackCopy(text);
}

function fallbackCopy(text){
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    textarea.style.top = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    let success = false;
    try {
        success = document.execCommand("copy");
    } catch(e) {
        success = false;
    }

    document.body.removeChild(textarea);
    return success;
}

function getStatusEl(targetId){
    const map = {
        userName: "micStatusName",
        personality: "micStatusPersonality",
        childhood: "micStatusChildhood",
        specialMoment: "micStatusSpecialMoment",
        valuableThing: "micStatusValuableThing",
        futureWish: "micStatusFutureWish"
    };
    return document.getElementById(map[targetId]);
}

function clearAllMicStates(){
    document.querySelectorAll(".mic-btn").forEach(btn => {
        btn.classList.remove("recording");
        btn.textContent = "🎤";
    });
}

function startVoice(targetId, btnEl){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const statusEl = getStatusEl(targetId);

    if(!SpeechRecognition){
        alert("이 기기에서는 음성 입력이 지원되지 않아요. 크롬 브라우저에서 다시 시도해 보세요.");
        return;
    }

    if(currentRecognition){
        try { currentRecognition.stop(); } catch(e) {}
        currentRecognition = null;
        clearAllMicStates();
    }

    const recognition = new SpeechRecognition();
    currentRecognition = recognition;

    recognition.lang = "ko-KR";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    if(btnEl){
        btnEl.classList.add("recording");
        btnEl.textContent = "🔴";
    }

    if(statusEl) statusEl.textContent = "🎤 듣고 있어요... 천천히 말씀해 주세요.";

    try {
        recognition.start();
    } catch(e) {
        if(statusEl) statusEl.textContent = "❌ 음성 입력을 시작할 수 없습니다.";
        clearAllMicStates();
        currentRecognition = null;
        return;
    }

    recognition.onresult = function(event){
        const text = event.results[0][0].transcript || "";
        const target = document.getElementById(targetId);
        if(target){
            target.value = text.trim();
            triggerAutoSave(targetId);
        }
        if(statusEl){
            statusEl.textContent = "✅ 입력이 끝났습니다.";
            setTimeout(() => { statusEl.textContent = ""; }, 2500);
        }
    };

    recognition.onerror = function(){
        if(statusEl){
            statusEl.textContent = "❌ 음성 입력에 실패했습니다.";
            setTimeout(() => { statusEl.textContent = ""; }, 2500);
        }
        clearAllMicStates();
        currentRecognition = null;
    };

    recognition.onend = function(){
        clearAllMicStates();
        currentRecognition = null;
    };
}

function saveAllInputs(){
    ["userName","personality","childhood","specialMoment","valuableThing","futureWish","fullText"].forEach(id => {
        const el = document.getElementById(id);
        if(el && STORAGE_KEYS[id]) saveToStorage(STORAGE_KEYS[id], el.value);
    });
    saveToStorage(STORAGE_KEYS.selectedGender, selectedGender);
}

function updateCopyOpenButtonState(){
    const btn = document.getElementById("copyOpenBtn");
    const hasPrompt = !!document.getElementById("promptPreview").textContent.trim();
    btn.disabled = !hasPrompt;
}

function generatePrompt(){
    const name = document.getElementById("userName").value.trim();
    const personality = document.getElementById("personality").value.trim();
    const childhood = document.getElementById("childhood").value.trim();
    const specialMoment = document.getElementById("specialMoment").value.trim();
    const valuableThing = document.getElementById("valuableThing").value.trim();
    const futureWish = document.getElementById("futureWish").value.trim();

    if(!name || !personality || !childhood || !specialMoment || !valuableThing || !futureWish){
        alert("질문을 모두 입력해주세요.");
        return;
    }

    const prompt = `당신은 어르신의 삶을 따뜻하게 담아내는 뛰어난 그림책 작가입니다.

이 그림책의 목표는 경도의 인지장애가 있으신 어르신들이
자신의 인생 이야기를 통해 삶의 가치와 사랑, 희망, 소망을 보여주는 것입니다.
이 목표를 마음에 두고 밝고 창의적이며 따뜻한 그림책을 만들어 주세요.

다음 정보를 바탕으로 표지를 포함한 총 5페이지 그림책을 만들어 주세요.

[주인공]
한국인 ${selectedGender} ${name}

[인물 정보]
성격: ${personality}

[삶의 이야기]
어린 시절 기억: ${childhood}
특별하고 행복했던 순간: ${specialMoment}
지금 소중하게 생각하는 것: ${valuableThing}
앞으로의 바람: ${futureWish}

[규칙]
1. 내용은 밝고 따뜻하며 존중이 느껴지게 써 주세요.
2. 전체 분위기는 밝고 즐겁고 창의적으로 전개해 주세요.
3. 마지막은 독자에게 감동과 교훈을 주는 마무리로 써 주세요.
4. 제목은 호기심을 불러일으키고, 감정을 불러일으키며, 사랑과 존중을 표현하는 말로 만들어 주세요.
5. 표지를 포함해 총 5페이지로 만들어 주세요.
6. 표지는 제목에 어울리는 표지 이미지 프롬프트만 작성해 주세요. 표지 내용은 쓰지 마세요.
7. 표지를 제외한 1~4페이지는 각각 따뜻하고 밝은 동화책 스타일의 내용을 써 주세요.
8. 표지와 각 페이지마다 구글플로우에서 사용하기에 가장 적합한 이미지 프롬프트를 한글과 영어로 모두 자세히 작성해 주세요.
9. 각 페이지의 영어 이미지 프롬프트에는 다음 스타일을 자연스럽게 반영해 주세요:
soft watercolor illustration, warm light,  Ghibli-inspired mood, cinematic composition, consistent character design, peaceful and hopeful atmosphere.
10. 등장인물은 모든 페이지에서 일관되게 유지해 주세요. 다만 시간 흐름에 따른 자연스러운 나이 변화는 괜찮습니다.
11. 이미지에는 글자나 한글이 들어가지 않게 해 주세요.
12. 각 페이지는 서로 다른 장면이 되도록 써 주세요.
13. 내용이 비어 있는 부분은 전체 이야기 흐름에 어울리게 자연스럽게 채워 주세요.
14. 출력 형식은 반드시 아래 형식을 정확히 지켜 주세요.

[출력 형식]
제목:
표지 이미지 프롬프트(한글):
표지 이미지 프롬프트(영어):

1페이지 내용:
1페이지 이미지 프롬프트(한글):
1페이지 이미지 프롬프트(영어):

2페이지 내용:
2페이지 이미지 프롬프트(한글):
2페이지 이미지 프롬프트(영어):

3페이지 내용:
3페이지 이미지 프롬프트(한글):
3페이지 이미지 프롬프트(영어):

4페이지 내용:
4페이지 이미지 프롬프트(한글):
4페이지 이미지 프롬프트(영어):`;

    const preview = document.getElementById("promptPreview");
    preview.textContent = prompt;
    saveToStorage(STORAGE_KEYS.promptPreview, prompt);
    saveAllInputs();
    updateCopyOpenButtonState();
    preview.scrollIntoView({ behavior: "smooth", block: "start" });
}

async function copyPromptAndOpenChatGPT(){
    const text = document.getElementById("promptPreview").textContent.trim();
    if(!text){
        alert("먼저 프롬프트를 생성해주세요.");
        return;
    }

    const ok = await copyText(text);

    if(ok){
        alert("프롬프트를 복사했습니다. 이제 열리는 ChatGPT 화면에 길게 눌러 붙여넣으세요.");
    } else {
        alert("복사는 실패했지만 ChatGPT 화면은 열어드릴게요. 프롬프트를 직접 길게 눌러 복사해 주세요.");
    }

    window.open(CHATGPT_URL, "_blank", "noopener");
}

function createCopyBox(title, content, type){
    const safeTitle = escapeHtml(title);
    const safeContent = escapeHtml(content || "");
    const openLabel = type === "flow" ? "🌐 플로우 열기" : "🎨 캔바 열기";
    const openUrl = type === "flow" ? FLOW_URL : CANVA_URL;

    return `
        <div class="result-box">
            <div class="box-header">${safeTitle}</div>
            <div class="box-content">${safeContent}</div>
            <div class="box-footer">
                <button class="copy-box-btn" onclick="copyBox(this)">📋 복사</button>
                <a href="${openUrl}" class="open-box-btn" target="_blank" rel="noopener">${openLabel}</a>
            </div>
        </div>
    `;
}

function parseText(){
    const full = document.getElementById("fullText").value.trim();
    const output = document.getElementById("parsedOutput");

    if(!full){
        alert("텍스트를 붙여넣어 주세요.");
        return;
    }

    saveToStorage(STORAGE_KEYS.fullText, full);

    let parsedHTML = "";
    const title = extractSingleLine(full, /(?:^|\n)\s*제목\s*:\s*(.+)/i);
    const coverKo = extractSectionByLabel(full, `표지\\s*이미지\\s*프롬프트\\s*\\(한글\\)`);
    const coverEn = extractSectionByLabel(full, `표지\\s*이미지\\s*프롬프트\\s*\\(영어\\)`);

    if(title){
        parsedHTML += createCopyBox("제목", title, "canva");
    }

    let combinedCoverPrompt = "";
    if(coverKo){
        combinedCoverPrompt += `표지 이미지 프롬프트(한글):\n${coverKo}`;
    }
    if(coverEn){
        if(combinedCoverPrompt) combinedCoverPrompt += `\n\n`;
        combinedCoverPrompt += `표지 이미지 프롬프트(영어):\n${coverEn}`;
    }
    if(combinedCoverPrompt){
        parsedHTML += createCopyBox("표지 그림명령어", combinedCoverPrompt, "flow");
    }

    for(let i = 1; i <= 4; i++){
        const pageText = extractSectionByLabel(full, `${i}\\s*페이지\\s*내용`);
        const imgKo = extractSectionByLabel(full, `${i}\\s*페이지\\s*이미지\\s*프롬프트\\s*\\(한글\\)`);
        const imgEn = extractSectionByLabel(full, `${i}\\s*페이지\\s*이미지\\s*프롬프트\\s*\\(영어\\)`);

        if(pageText){
            parsedHTML += createCopyBox(`${i}페이지 글`, pageText, "canva");
        }

        let combinedPrompt = "";
        if(imgKo){
            combinedPrompt += `${i}페이지 이미지 프롬프트(한글):\n${imgKo}`;
        }
        if(imgEn){
            if(combinedPrompt) combinedPrompt += `\n\n`;
            combinedPrompt += `${i}페이지 이미지 프롬프트(영어):\n${imgEn}`;
        }

        if(combinedPrompt){
            parsedHTML += createCopyBox(`${i}페이지 그림명령어`, combinedPrompt, "flow");
        }
    }

    if(!parsedHTML){
        parsedHTML = `<div class="result-box">분류할 내용을 찾지 못했습니다.

확인해주세요:
1. 제목:
2. 표지 이미지 프롬프트(한글):
3. 표지 이미지 프롬프트(영어):
4. 1페이지 내용:
5. 1페이지 이미지 프롬프트(한글):
6. 1페이지 이미지 프롬프트(영어):</div>`;
    }

    output.innerHTML = parsedHTML;
    saveToStorage(STORAGE_KEYS.parsedOutput, parsedHTML);
    output.scrollIntoView({ behavior: "smooth", block: "start" });
}

function extractSingleLine(fullText, regex){
    const match = fullText.match(regex);
    return match && match[1] ? match[1].trim() : "";
}

function extractSectionByLabel(fullText, labelPattern){
    const regex = new RegExp(
        `(?:^|\\n)\\s*${labelPattern}\\s*:\\s*([\\s\\S]*?)(?=\\n\\s*(?:제목|표지\\s*이미지\\s*프롬프트\\s*\\(한글\\)|표지\\s*이미지\\s*프롬프트\\s*\\(영어\\)|\\d+\\s*페이지\\s*내용|\\d+\\s*페이지\\s*이미지\\s*프롬프트\\s*\\(한글\\)|\\d+\\s*페이지\\s*이미지\\s*프롬프트\\s*\\(영어\\))\\s*:|$)`,
        "i"
    );
    const match = fullText.match(regex);
    return match && match[1] ? match[1].trim() : "";
}

async function copyBox(btn){
    const box = btn.closest(".result-box");
    const contentEl = box.querySelector(".box-content");
    const text = contentEl ? contentEl.innerText.trim() : "";

    if(!text){
        alert("복사할 내용이 없습니다.");
        return;
    }

    const ok = await copyText(text);

    if(ok){
        const originalText = btn.textContent;
        btn.textContent = "✅ 복사됨";
        btn.style.background = "#2e7d32";
        setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = "#ef8f00";
        }, 1500);
    } else {
        alert("복사에 실패했습니다.");
    }
}

function triggerAutoSave(targetId){
    const el = document.getElementById(targetId);
    if(!el) return;
    if(STORAGE_KEYS[targetId]){
        saveToStorage(STORAGE_KEYS[targetId], el.value);
    }
}

function attachAutoSave(){
    const ids = ["userName", "personality", "childhood", "specialMoment", "valuableThing", "futureWish", "fullText"];
    ids.forEach(id => {
        const el = document.getElementById(id);
        if(el){
            el.addEventListener("input", () => triggerAutoSave(id));
            el.addEventListener("change", () => triggerAutoSave(id));
        }
    });
}

function restoreSavedData(){
    document.getElementById("userName").value = loadFromStorage(STORAGE_KEYS.userName);
    document.getElementById("personality").value = loadFromStorage(STORAGE_KEYS.personality);
    document.getElementById("childhood").value = loadFromStorage(STORAGE_KEYS.childhood);
    document.getElementById("specialMoment").value = loadFromStorage(STORAGE_KEYS.specialMoment);
    document.getElementById("valuableThing").value = loadFromStorage(STORAGE_KEYS.valuableThing);
    document.getElementById("futureWish").value = loadFromStorage(STORAGE_KEYS.futureWish);
    document.getElementById("fullText").value = loadFromStorage(STORAGE_KEYS.fullText);
    document.getElementById("promptPreview").textContent = loadFromStorage(STORAGE_KEYS.promptPreview);
    document.getElementById("parsedOutput").innerHTML = loadFromStorage(STORAGE_KEYS.parsedOutput);

    const savedGender = loadFromStorage(STORAGE_KEYS.selectedGender);
    if(savedGender === "할아버지"){
        setGender("할아버지", "btn-male");
    } else {
        setGender("할머니", "btn-female");
    }

    updateCopyOpenButtonState();
}

function resetThinkingTab(){
    if(!confirm("생각주머니의 입력 내용과 생성된 프롬프트를 모두 지울까요?")) return;
    ["userName","personality","childhood","specialMoment","valuableThing","futureWish"].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.value = "";
        if(STORAGE_KEYS[id]) saveToStorage(STORAGE_KEYS[id], "");
    });
    document.getElementById("promptPreview").textContent = "";
    saveToStorage(STORAGE_KEYS.promptPreview, "");
    saveToStorage(STORAGE_KEYS.selectedGender, "할머니");
    setGender("할머니", "btn-female");
    updateCopyOpenButtonState();
}

function resetMakerTab(){
    if(!confirm("만들기상자의 붙여넣은 내용과 분류 결과를 모두 지울까요?")) return;
    document.getElementById("fullText").value = "";
    document.getElementById("parsedOutput").innerHTML = "";
    saveToStorage(STORAGE_KEYS.fullText, "");
    saveToStorage(STORAGE_KEYS.parsedOutput, "");
}

function escapeHtml(str){
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

document.addEventListener("DOMContentLoaded", function(){
    restoreSavedData();
    attachAutoSave();
});
</script>
