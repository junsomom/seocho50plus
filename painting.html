<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>내 멋진 인생의 한 컷</title>
  <style>
    :root {
      --primary: #8d6e63;
      --primary-dark: #5d4037;
      --light-bg: #f4efe6;
      --card-bg: #f8f1df;
      --soft-card: #f6edd8;
      --border-color: #d7c3a3;
      --text-main: #3e2f26;
      --text-sub: #7b6658;

      --example-bg: #dce8b2;
      --example-active: #b8d68f;

      --mic-bg: #ffd7b5;
      --mic-recording: #e98f8f;

      --clear-bg: #d7d1cb;
      --clear-text: #4e443d;

      --prompt-btn: #c8c3e6;
      --gemcopy-btn: #b7dfd3;
      --chatgpt-btn: #cfe7c8;
      --reset-btn: #efbfd0;

      --focus-ring: 0 0 0 4px rgba(141, 110, 99, 0.18);
      --done-bg: #e8f0d8;
      --done-text: #4d6b2f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 204, 128, 0.18) 0, transparent 18%),
        radial-gradient(circle at 88% 14%, rgba(129, 199, 132, 0.14) 0, transparent 18%),
        radial-gradient(circle at 82% 82%, rgba(121, 134, 203, 0.10) 0, transparent 20%),
        #f4efe6;
      color: var(--text-main);
      line-height: 1.6;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(180deg, #a98274 0%, #8d6e63 100%);
      color: #fffdf8;
      text-align: center;
      padding: 16px 12px;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 3px 10px rgba(79, 55, 44, 0.18);
      letter-spacing: -0.2px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px;
    }

    .panel {
      background: linear-gradient(180deg, #fbf4e5 0%, #f6eddc 100%);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(93, 64, 55, 0.10);
      border: 1.5px solid #dcc7a8;
      position: relative;
    }

    .panel::before {
      content: "🎨";
      position: absolute;
      top: 14px;
      right: 16px;
      font-size: 22px;
      opacity: 0.75;
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 26px;
      color: var(--primary-dark);
    }

    .panel p.desc {
      margin: 0 0 8px;
      font-size: 16px;
      color: var(--text-sub);
    }

    .guide-box {
      margin: 0 0 18px;
      background: linear-gradient(180deg, #fff8e8 0%, #f8edd2 100%);
      color: #6d4c41;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
      border: 1.5px solid #dec9a5;
      box-shadow: 0 4px 10px rgba(93, 64, 55, 0.06);
      position: relative;
    }

    .guide-box::before {
      content: "🖌";
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 18px;
      opacity: 0.7;
    }

    .question-card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.22), rgba(0,0,0,0.02)),
        #f5ead2;
      border: 1.5px solid #d5bc97;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 5px 14px rgba(90, 62, 45, 0.08);
      position: relative;
    }

    .question-card::before {
      content: "";
      position: absolute;
      top: -8px;
      left: 20px;
      width: 78px;
      height: 18px;
      background: rgba(255, 248, 196, 0.72);
      border-radius: 4px;
      transform: rotate(-4deg);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    .question-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #4e342e;
    }

    .question-title-text {
      flex: 1;
      min-width: 0;
    }

    .question-sub {
      margin-top: -2px;
      margin-bottom: 12px;
      font-size: 15px;
      color: var(--text-sub);
    }

    .completion-badge {
      display: none;
      flex-shrink: 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--done-bg);
      color: var(--done-text);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      border: 1px solid rgba(77, 107, 47, 0.18);
    }

    .completion-badge.show {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .question-label {
      display: block;
      margin-bottom: 8px;
    }

    .answer-box {
      width: 100%;
      min-height: 82px;
      border: 2px solid #cfb58e;
      border-radius: 16px;
      padding: 15px;
      font-size: 19px;
      resize: vertical;
      outline: none;
      background: #fffaf0;
      color: #3b2f2a;
    }

    .answer-box:focus {
      border-color: var(--primary);
      box-shadow: var(--focus-ring);
    }

    .answer-box::placeholder {
      color: #b8aa96;
      opacity: 1;
    }

    .answer-box:not(:placeholder-shown) {
      border-color: #a1887f;
    }

    button:focus-visible,
    textarea:focus-visible,
    input:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    .answer-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .mini-btn {
      flex: 1;
      border: none;
      border-radius: 18px;
      min-height: 56px;
      padding: 12px 8px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        0 4px 8px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .mini-btn:active,
    .tool-btn:active {
      transform: scale(0.98);
    }

    .mini-btn.mic-btn {
      background: linear-gradient(180deg, #ffdcbf 0%, #ffc999 100%);
      color: #6d4c41;
    }

    .mini-btn.mic-btn.recording {
      background: linear-gradient(180deg, #efb0b0 0%, #e98f8f 100%);
      color: #fff;
      animation: pulse 1s infinite;
    }

    .mini-btn.clear-btn {
      background: linear-gradient(180deg, #e4ddd7 0%, #d6cec7 100%);
      color: #4e443d;
    }

    .mini-btn.example-btn {
      background: linear-gradient(180deg, #e4efbf 0%, #d2e39a 100%);
      color: #48611f;
    }

    .mini-btn.example-btn.active {
      background: linear-gradient(180deg, #cfe29a 0%, #b8d68f 100%);
      color: #2f4e12;
    }

    .option-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .option-btn {
      border: none;
      border-radius: 16px;
      min-height: 52px;
      padding: 12px 16px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(180deg, #f7efdf 0%, #ead9bc 100%);
      color: #5d4037;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        0 4px 8px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .option-btn.selected {
      background: linear-gradient(180deg, #d7e9b4 0%, #bddb8f 100%);
      color: #365218;
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 6px;
      font-size: 14px;
      color: var(--text-sub);
      min-height: 20px;
    }

    .tool-section {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tool-btn {
      border: none;
      border-radius: 18px;
      min-height: 60px;
      padding: 14px 16px;
      font-size: 19px;
      font-weight: 800;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        0 4px 8px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .tool-btn.prompt {
      background: linear-gradient(180deg, #d7d2ef 0%, #c3bde6 100%);
      color: #4b3f72;
    }

    .tool-btn.gemcopy {
      background: linear-gradient(180deg, #ccece3 0%, #b7dfd3 100%);
      color: #1f5c52;
    }

    .tool-btn.chatgpt {
      background: linear-gradient(180deg, #dcefd7 0%, #cfe7c8 100%);
      color: #2d5b2f;
    }

    .tool-btn.reset {
      background: linear-gradient(180deg, #f5d1dd 0%, #efbfd0 100%);
      color: #7a294d;
    }

    .output-title {
      margin-top: 14px;
      margin-bottom: 8px;
      font-size: 20px;
      font-weight: 800;
      color: var(--primary-dark);
    }

    .output-box {
      width: 100%;
      min-height: 340px;
      border: 2px solid #cfb58e;
      border-radius: 16px;
      padding: 14px;
      font-size: 17px;
      background: #fffaf0;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      color: #3b2f2a;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.03);
    }

    .save-indicator {
      font-size: 13px;
      color: var(--primary-dark);
      min-height: 18px;
      text-align: right;
      margin-top: 4px;
      font-weight: 700;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @media (max-width: 640px) {
      header {
        font-size: 21px;
        padding: 15px 10px;
      }

      .panel h2 {
        font-size: 24px;
      }

      .panel p.desc {
        font-size: 16px;
        margin-bottom: 10px;
      }

      .guide-box {
        font-size: 15px;
        padding: 14px;
      }

      .question-title {
        font-size: 18px;
      }

      .question-sub {
        font-size: 14px;
      }

      .completion-badge {
        font-size: 12px;
        padding: 4px 7px;
      }

      .answer-box {
        font-size: 18px;
        min-height: 78px;
        padding: 14px;
      }

      .answer-actions {
        gap: 6px;
        margin-top: 10px;
      }

      .mini-btn {
        min-height: 54px;
        font-size: 16px;
        padding: 10px 6px;
      }

      .option-btn {
        min-height: 50px;
        font-size: 16px;
        padding: 10px 14px;
      }

      .tool-btn {
        min-height: 56px;
        font-size: 18px;
        padding: 12px 14px;
      }

      .output-box {
        font-size: 16px;
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <header>🎨 3주차 그림주머니</header>

  <div class="container">
    <section class="panel">
      <h2>내 멋진 인생의 한 컷</h2>
      <p class="desc">가장 기억에 남는 장면 하나만 떠올려 보세요 ✨</p>
      <div class="guide-box">짧게 말해도 괜찮아요 😊<br>한 장면만 떠올리면 그림은 멋지게 만들어집니다 🎨</div>

      <div id="questions-wrap"></div>
      <div id="saveIndicator" class="save-indicator" aria-live="polite"></div>
    </section>

    <div class="tool-section">
      <button class="tool-btn prompt" id="makePromptBtn" type="button" aria-label="그림 주문서 만들기">🎨 그림 주문서 만들기</button>

      <div class="output-title">화가의 그림 주문서</div>
      <div id="compiledOutput" class="output-box" aria-label="프롬프트 결과" aria-live="polite"></div>

      <button class="tool-btn gemcopy" id="copyAndOpenBtn" type="button" aria-label="복사하고 그림 그리기 열기">🖌 복사하고 Flow 열기</button>
      <button class="tool-btn chatgpt" id="copyAndOpenChatGPTBtn" type="button" aria-label="복사하고 ChatGPT 열기">📋✨ 복사하고 ChatGPT 열기</button>
      <button class="tool-btn reset" id="resetBtn" type="button" aria-label="모든 내용 지우기">🗑 모두 지우기</button>
    </div>
  </div>

  <script>
    const FLOW_URL = 'https://labs.google/fx/ko/tools/flow';
    const CHATGPT_URL = 'https://chat.openai.com/';
    const STORAGE_KEY = 'painting_html_simple_v2';

    const questions = [
      {
        type: 'buttons',
        title: '언제 모습인가요?',
        sub: '하나만 눌러주세요',
        options: ['어린 시절', '젊은 시절', '중년', '노년']
      },
      {
        type: 'buttons',
        title: '언제 시간인가요?',
        sub: '하나만 눌러주세요',
        options: ['새벽', '아침', '낮', '노을', '저녁']
      },
      {
        type: 'text',
        title: '어디에 있었나요?',
        sub: '장소를 짧게 적어보세요',
        placeholder: '예: 제주도 바닷가'
      },
      {
        type: 'text',
        title: '누구와 있었나요?',
        sub: '혼자여도 괜찮아요',
        placeholder: '예: 남편과 함께'
      },
      {
        type: 'text',
        title: '무엇을 하고 있었나요?',
        sub: '짧게 말해도 됩니다',
        placeholder: '예: 손을 잡고 걷고 있었어요'
      },
      {
        type: 'text',
        title: '어떤 옷을 입고 있었나요?',
        sub: '옷차림을 짧게 적어보세요',
        placeholder: '예: 밝은 색 원피스를 입고 있었어요'
      },
      {
        type: 'text',
        title: '어떤 날씨였나요?',
        sub: '하늘, 바람, 계절 느낌도 좋아요',
        placeholder: '예: 따뜻한 봄날이고 바람이 살짝 불었어요'
      },
      {
        type: 'text',
        title: '기분은 어땠나요?',
        sub: '한두 마디면 충분해요',
        placeholder: '예: 행복하고 따뜻했어요'
      }
    ];

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let activeRecognition = null;
    let activeMicButton = null;
    let saveIndicatorTimer = null;

    function showSaveIndicator(message = '자동 저장됨') {
      const el = document.getElementById('saveIndicator');
      el.textContent = message;
      if (saveIndicatorTimer) clearTimeout(saveIndicatorTimer);
      saveIndicatorTimer = setTimeout(() => {
        el.textContent = '';
      }, 1500);
    }

    function saveData() {
      try {
        const data = {};

        document.querySelectorAll('.answer-box').forEach(box => {
          data[box.id] = box.value;
        });

        document.querySelectorAll('.option-group').forEach(group => {
          const hiddenInput = group.parentElement.querySelector('.option-value');
          if (hiddenInput) {
            data[hiddenInput.id] = hiddenInput.value;
          }
        });

        const compiledOutput = document.getElementById('compiledOutput');
        if (compiledOutput) data.compiledOutput = compiledOutput.textContent;

        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        showSaveIndicator();
      } catch (error) {
        console.error('저장 실패:', error);
        showSaveIndicator('저장되지 않았어요');
      }
    }

    function debounce(fn, delay) {
      let timer = null;
      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    const saveDataDebounced = debounce(saveData, 500);

    function updateCompletionState(targetId) {
      const input = document.getElementById(targetId);
      if (!input) return;

      const num = targetId.replace('q', '');
      const badge = document.getElementById(`complete-${num}`);
      if (!badge) return;

      badge.classList.toggle('show', !!input.value.trim());
    }

    function updateAllCompletionStates() {
      for (let i = 1; i <= questions.length; i++) {
        updateCompletionState(`q${i}`);
      }
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          updateAllCompletionStates();
          return;
        }

        const data = JSON.parse(raw);

        Object.keys(data).forEach(id => {
          const el = document.getElementById(id);
          if (!el) return;

          if (el.classList.contains('answer-box') || el.classList.contains('option-value')) {
            el.value = data[id];
          }
        });

        document.querySelectorAll('.option-value').forEach(hiddenInput => {
          const value = hiddenInput.value;
          if (!value) return;

          const group = hiddenInput.parentElement.querySelector('.option-group');
          if (!group) return;

          group.querySelectorAll('.option-btn').forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.value === value);
          });
        });

        if (data.compiledOutput) {
          const compiledOutput = document.getElementById('compiledOutput');
          if (compiledOutput) compiledOutput.textContent = data.compiledOutput;
        }

        updateAllCompletionStates();
      } catch (error) {
        console.error('불러오기 실패:', error);
      }
    }

    function createQuestionCards() {
      const wrap = document.getElementById('questions-wrap');

      questions.forEach((question, index) => {
        const qNum = index + 1;
        const answerId = `q${qNum}`;
        const statusId = `status${qNum}`;

        const card = document.createElement('div');
        card.className = 'question-card';

        if (question.type === 'buttons') {
          card.innerHTML = `
            <label class="question-label" for="${answerId}">
              <div class="question-title">
                <span class="question-title-text">${qNum}. ${question.title}</span>
                <span class="completion-badge" id="complete-${qNum}">완료</span>
              </div>
            </label>
            ${question.sub ? `<div class="question-sub">${question.sub}</div>` : ''}
            <input type="hidden" id="${answerId}" class="option-value" aria-label="${question.title}">
            <div class="option-group" data-target="${answerId}">
              ${question.options.map(option => `
                <button class="option-btn" type="button" data-target="${answerId}" data-value="${option}" aria-label="${option}">
                  ${option}
                </button>
              `).join('')}
            </div>
            <div class="status" id="${statusId}" aria-live="polite"></div>
          `;
        } else {
          card.innerHTML = `
            <label class="question-label" for="${answerId}">
              <div class="question-title">
                <span class="question-title-text">${qNum}. ${question.title}</span>
                <span class="completion-badge" id="complete-${qNum}">완료</span>
              </div>
            </label>
            ${question.sub ? `<div class="question-sub">${question.sub}</div>` : ''}
            <textarea id="${answerId}" class="answer-box" placeholder="${question.placeholder}" aria-label="${question.title}"></textarea>
            <div class="answer-actions">
              <button class="mini-btn mic-btn" type="button" data-target="${answerId}" data-status="${statusId}" aria-label="${question.title} 음성 입력">🎤 말하기</button>
              <button class="mini-btn clear-btn" type="button" data-target="${answerId}" aria-label="${question.title} 지우기">🗑 지우기</button>
              <button class="mini-btn example-btn" type="button" data-target="${answerId}" data-example="${question.placeholder}" aria-label="${question.title} 예시 넣기">💡 예시</button>
            </div>
            <div class="status" id="${statusId}" aria-live="polite"></div>
          `;
        }

        wrap.appendChild(card);
      });
    }

    function stopCurrentRecognition() {
      if (activeRecognition) {
        try {
          activeRecognition.stop();
        } catch (e) {
          console.error(e);
        }
      }
      if (activeMicButton) {
        activeMicButton.classList.remove('recording');
        activeMicButton.textContent = '🎤 말하기';
        activeMicButton.setAttribute('aria-label', '음성 입력');
      }
      activeRecognition = null;
      activeMicButton = null;
    }

    function startVoiceInput(targetId, statusId, micButton) {
      const textarea = document.getElementById(targetId);
      const statusEl = document.getElementById(statusId);

      if (!textarea || !statusEl) return;

      if (!SpeechRecognition) {
        statusEl.textContent = '이 기기에서는 음성 입력이 지원되지 않습니다.';
        return;
      }

      if (activeMicButton === micButton && activeRecognition) {
        stopCurrentRecognition();
        return;
      }

      stopCurrentRecognition();

      const recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.continuous = false;

      let finalTranscript = '';
      let silenceTimer = null;
      const originalValue = textarea.value.trim();

      activeRecognition = recognition;
      activeMicButton = micButton;

      micButton.classList.add('recording');
      micButton.textContent = '⏹ 녹음중';
      micButton.setAttribute('aria-label', '녹음 중');
      statusEl.textContent = '녹음 중입니다.';

      recognition.onresult = function (event) {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const piece = event.results[i][0].transcript.trim();
          if (event.results[i].isFinal) {
            finalTranscript += (finalTranscript ? ' ' : '') + piece;
          } else {
            interimTranscript += (interimTranscript ? ' ' : '') + piece;
          }
        }

        textarea.value = [originalValue, finalTranscript, interimTranscript].filter(Boolean).join(' ');
        if (silenceTimer) clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
          try {
            recognition.stop();
          } catch (e) {
            console.error(e);
          }
        }, 1800);
      };

      recognition.onerror = function (event) {
        if (silenceTimer) clearTimeout(silenceTimer);
        let message = '음성 입력에 문제가 생겼습니다.';
        if (event.error === 'not-allowed') message = '마이크 권한을 허용해주세요.';
        if (event.error === 'no-speech') message = '말씀이 들리지 않았습니다. 다시 눌러주세요.';
        if (event.error === 'audio-capture') message = '마이크를 찾을 수 없습니다.';
        statusEl.textContent = message;
      };

      recognition.onend = function () {
        if (silenceTimer) clearTimeout(silenceTimer);
        textarea.value = textarea.value.trim();
        saveData();
        updateCompletionState(targetId);
        if (textarea.value) statusEl.textContent = '입력이 완료되었습니다.';
        if (activeMicButton === micButton) {
          micButton.classList.remove('recording');
          micButton.textContent = '🎤 말하기';
          micButton.setAttribute('aria-label', '음성 입력');
        }
        activeRecognition = null;
        activeMicButton = null;
      };

      try {
        recognition.start();
      } catch (error) {
        console.error('음성 인식 시작 실패:', error);
        statusEl.textContent = '음성 입력을 시작할 수 없습니다.';
      }
    }

    function clearAnswer(targetId) {
      const input = document.getElementById(targetId);
      if (!input) return;

      if (activeMicButton && activeMicButton.dataset.target === targetId) {
        stopCurrentRecognition();
      }

      input.value = '';

      document.querySelectorAll(`.example-btn[data-target="${targetId}"]`).forEach(btn => {
        btn.classList.remove('active');
      });

      const optionGroup = document.querySelector(`.option-group[data-target="${targetId}"]`);
      if (optionGroup) {
        optionGroup.querySelectorAll('.option-btn').forEach(btn => {
          btn.classList.remove('selected');
        });
      }

      saveData();
      updateCompletionState(targetId);
    }

    function setupInteractions() {
      document.addEventListener('click', function (e) {
        const optionBtn = e.target.closest('.option-btn');
        if (optionBtn) {
          const targetId = optionBtn.dataset.target;
          const value = optionBtn.dataset.value;
          const hiddenInput = document.getElementById(targetId);
          const group = optionBtn.closest('.option-group');

          if (hiddenInput && group) {
            hiddenInput.value = value;
            group.querySelectorAll('.option-btn').forEach(btn => {
              btn.classList.toggle('selected', btn === optionBtn);
            });
            saveData();
            updateCompletionState(targetId);
          }
          return;
        }

        const micButton = e.target.closest('.mic-btn');
        if (micButton) {
          startVoiceInput(micButton.dataset.target, micButton.dataset.status, micButton);
          return;
        }

        const clearBtn = e.target.closest('.clear-btn');
        if (clearBtn) {
          clearAnswer(clearBtn.dataset.target);
          return;
        }

        const exampleBtn = e.target.closest('.example-btn');
        if (exampleBtn) {
          const targetId = exampleBtn.dataset.target;
          const example = exampleBtn.dataset.example.replace('예: ', '');
          const textarea = document.getElementById(targetId);
          if (textarea) {
            textarea.value = example;
            exampleBtn.classList.add('active');
            saveData();
            updateCompletionState(targetId);
          }
          return;
        }
      });
    }

    function compilePrompt() {
      try {
        const output = document.getElementById('compiledOutput');
        output.textContent = '프롬프트를 만드는 중입니다...';

        const get = (n) => {
          const el = document.getElementById(`q${n}`);
          return el ? el.value.trim() : '';
        };

        const whenText = get(1) || 'young adulthood';
        const timeText = get(2) || 'daytime';
        const placeText = get(3) || 'a meaningful place';
        const withWhoText = get(4) || 'a loved one';
        const actionText = get(5) || 'sharing a beautiful moment together';
        const clothesText = get(6) || 'simple elegant clothing';
        const weatherText = get(7) || 'a gentle clear day';
        const feelingText = get(8) || 'warm, peaceful, and happy';

        const prompt = `A cinematic nostalgic scene of a precious life memory.

The illustration shows a Korean person in ${whenText}, at ${placeText}, with ${withWhoText}.
They are ${actionText}, wearing ${clothesText}, captured naturally in a heartfelt and beautiful moment.
The scene takes place in ${timeText}.
The weather is ${weatherText}.
The emotional tone feels ${feelingText}, peaceful, loving, and full of memory.

Create a warm and gentle facial expression, graceful posture, and emotionally rich storytelling.
Make the person look dignified, kind, natural, and deeply human.
Show a harmonious composition with strong visual focus, soft depth, and natural movement.

Build a beautiful background that matches ${placeText} naturally,
with atmospheric details based on ${timeText} and ${weatherText}, soft wind, subtle light, rich layers, and an elegant sense of place.
Add cinematic storytelling, visual balance, and a touching life-memory feeling.

Ghibli-inspired, soft watercolor illustration,
warm golden light, emotional atmosphere,
cinematic composition, detailed background,
main character focus, consistent character design,
gentle children's book illustration style,
high quality, elegant, heartfelt, no text`;

        output.textContent = prompt;
        saveData();
      } catch (error) {
        console.error('프롬프트 생성 실패:', error);
        document.getElementById('compiledOutput').textContent = '프롬프트 생성 중 오류가 생겼습니다.';
      }
    }

    async function copyAndOpenFlow() {
      const text = document.getElementById('compiledOutput').textContent.trim();
      if (!text || text === '프롬프트를 만드는 중입니다...') {
        alert('먼저 그림 주문서 만들기 버튼을 눌러주세요.');
        return;
      }

      saveData();

      let copied = false;

      try {
        await navigator.clipboard.writeText(text);
        copied = true;
      } catch (error) {
        console.error('복사 실패:', error);
      }

      const newWindow = window.open(FLOW_URL, '_blank');

      if (!newWindow) {
        if (copied) {
          alert('복사는 되었지만 새 창이 차단되었어요. 브라우저 설정을 확인해주세요.');
        } else {
          alert('복사도 안 되고 새 창도 차단되었어요. 다시 눌러주세요.');
        }
        return;
      }

      if (copied) {
        alert('프롬프트를 복사했어요. Flow에서 길게 눌러 붙여넣기 해주세요.');
      } else {
        alert('그림 그리기 화면은 열렸지만 복사는 안 되었어요. 이 화면으로 돌아와 프롬프트를 직접 복사해주세요.');
      }
    }

    async function copyAndOpenChatGPT() {
      const text = document.getElementById('compiledOutput').textContent.trim();
      if (!text || text === '프롬프트를 만드는 중입니다...') {
        alert('먼저 그림 주문서 만들기 버튼을 눌러주세요.');
        return;
      }

      saveData();

      let copied = false;

      try {
        await navigator.clipboard.writeText(text);
        copied = true;
      } catch (error) {
        console.error('복사 실패:', error);
      }

      const newWindow = window.open(CHATGPT_URL, '_blank');

      if (!newWindow) {
        if (copied) {
          alert('복사는 되었지만 새 창이 차단되었어요. 브라우저 설정을 확인해주세요.');
        } else {
          alert('복사도 안 되고 새 창도 차단되었어요. 다시 눌러주세요.');
        }
        return;
      }

      if (copied) {
        alert('프롬프트를 복사했어요. ChatGPT에서 길게 눌러 붙여넣기 해주세요.');
      } else {
        alert('ChatGPT 화면은 열렸지만 복사는 안 되었어요. 이 화면으로 돌아와 프롬프트를 직접 복사해주세요.');
      }
    }

    function resetAll() {
      if (!confirm('모든 내용을 지울까요?')) return;

      document.querySelectorAll('.answer-box').forEach(box => {
        box.value = '';
      });

      document.querySelectorAll('.option-value').forEach(input => {
        input.value = '';
      });

      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.classList.remove('selected');
      });

      document.querySelectorAll('.example-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      document.getElementById('compiledOutput').textContent = '';

      try {
        localStorage.removeItem(STORAGE_KEY);
      } catch (error) {
        console.error('저장 삭제 실패:', error);
      }

      stopCurrentRecognition();
      updateAllCompletionStates();
      showSaveIndicator('모두 지워졌어요');
    }

    function setupInputs() {
      document.addEventListener('input', function (e) {
        if (e.target.classList.contains('answer-box')) {
          document.querySelectorAll(`.example-btn[data-target="${e.target.id}"]`).forEach(btn => {
            btn.classList.remove('active');
          });

          saveDataDebounced();
          updateCompletionState(e.target.id);
        }
      });
    }

    createQuestionCards();
    setupInteractions();
    setupInputs();
    loadData();

    document.getElementById('makePromptBtn').addEventListener('click', compilePrompt);
    document.getElementById('copyAndOpenBtn').addEventListener('click', copyAndOpenFlow);
    document.getElementById('copyAndOpenChatGPTBtn').addEventListener('click', copyAndOpenChatGPT);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
  </script>
</body>
