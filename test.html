<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 그림책 도우미</title>

<style>
body { font-family: 'Pretendard', sans-serif; background:#fffbe6; margin:0;}
header {text-align:center; background:#f57c00; color:white; font-size:32px; padding:20px; font-weight:bold;}
.container {max-width:700px; margin:0 auto; padding:20px;}

input, textarea {
  width:100%; padding:20px; font-size:24px;
  border-radius:16px; border:2px solid #f57c00;
  margin-top:10px;
}

button {
  width:100%; padding:20px; margin-top:15px;
  font-size:24px; border-radius:16px;
  border:none; cursor:pointer;
}

.main-btn { background:#f57c00; color:white; }
.reset-btn { background:#e53935; color:white; }

.example {
  color:#888;
  font-size:20px;
  margin-top:5px;
}

.mic-btn {
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:24px;
  width:50px; height:50px;
  border-radius:50%;
  background:#ffd54f;
  border:2px solid #f57c00;
}

.gender-btns { display:flex; gap:10px; margin-top:10px;}
.gender-btn {
  flex:1; padding:15px;
  font-size:22px;
  border-radius:12px;
  border:2px solid #f57c00;
  background:white;
}
.gender-btn.active {
  background:#f57c00;
  color:white;
}

.box {
  background:#fff3e0;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<header>생각주머니</header>

<div class="container">

<div id="questions"></div>

<button class="main-btn" onclick="generatePrompt()">👉 프롬프트 생성</button>
<button class="main-btn" onclick="goToChatGPT()">💬 ChatGPT로 바로 보내기</button>
<button class="reset-btn" onclick="resetAll()">🔄 새로 시작</button>

<div class="box" id="promptPreview"></div>

</div>

<script>

// ===== 질문 리스트 =====
const questionsList = [
  {id:"name", q:"성함을 알려주세요", ex:"예: 김영자"},
  {id:"personality", q:"어떤 성격이신가요?", ex:"예: 밝고 따뜻한 성격"},
  {id:"childhoodScene", q:"어린 시절 기억나는 장면은?", ex:"예: 운동장에서 뛰놀던 기억"},
  {id:"specialMoment", q:"인생에서 특별했던 순간은?", ex:"예: 첫 아이를 낳던 날"},
  {id:"childhoodDream", q:"어릴 적 꿈은?", ex:"예: 선생님"},
  {id:"currentWish", q:"요즘 즐거운 일은?", ex:"예: 손주와 시간 보내기"},
  {id:"values", q:"중요하게 생각하는 가치는?", ex:"예: 정직과 배려"},
  {id:"futureWish", q:"앞으로 하고 싶은 일은?", ex:"예: 여행, 그림책 만들기"}
];

let selectedGender="할머니";
let recognition;
let isListening=false;

// ===== 질문 생성 =====
const qDiv = document.getElementById("questions");

questionsList.forEach(q=>{
  let html = `
    <div style="margin-top:20px;">
      <div style="font-size:24px; font-weight:bold;">👉 ${q.q}</div>
      <div class="example">${q.ex}</div>
      <div style="position:relative;">
        <input id="${q.id}">
        <button class="mic-btn" onclick="startVoice('${q.id}')">🎤</button>
      </div>
    </div>
  `;

  if(q.id==="name"){
    html += `
    <div class="gender-btns">
      <div class="gender-btn active" onclick="setGender('할머니',this)">할머니</div>
      <div class="gender-btn" onclick="setGender('할아버지',this)">할아버지</div>
    </div>`;
  }

  qDiv.innerHTML += html;
});

// ===== 성별 =====
function setGender(g, el){
  selectedGender = g;
  document.querySelectorAll(".gender-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

// ===== 🎤 음성 입력 (강화 버전) =====
function startVoice(id){

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("크롬 브라우저를 사용해주세요");
    return;
  }

  if(isListening){
    recognition.stop();
    isListening=false;
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang="ko-KR";
  recognition.continuous=true;
  recognition.interimResults=true;

  let finalText="";

  recognition.onstart=()=>{
    isListening=true;
    alert("🎤 말씀해주세요");
  };

  recognition.onresult=(e)=>{
    let interim="";

    for(let i=e.resultIndex;i<e.results.length;i++){
      let txt=e.results[i][0].transcript;

      if(e.results[i].isFinal){
        finalText += txt+" ";
      } else {
        interim += txt;
      }
    }

    document.getElementById(id).value = finalText + interim;
  };

  recognition.onend=()=>{
    isListening=false;
    saveData();
  };

  recognition.onerror=()=>{
    alert("음성 인식 오류");
  };

  recognition.start();

  setTimeout(()=>{
    if(isListening){
      recognition.stop();
    }
  },5000);
}

// ===== 저장 =====
function saveData(){
  questionsList.forEach(q=>{
    localStorage.setItem(q.id, document.getElementById(q.id).value);
  });
}

document.addEventListener("input", saveData);

// ===== 불러오기 =====
window.onload = ()=>{
  questionsList.forEach(q=>{
    if(localStorage.getItem(q.id)){
      document.getElementById(q.id).value = localStorage.getItem(q.id);
    }
  });

  if(localStorage.getItem("prompt")){
    document.getElementById("promptPreview").textContent = localStorage.getItem("prompt");
  }
};

// ===== 프롬프트 =====
function generatePrompt(){

  let p = `
당신은 감성적인 동화 작가입니다.

주인공: ${selectedGender} ${val("name")}

성격: ${val("personality")}
어린시절: ${val("childhoodScene")}
특별한 순간: ${val("specialMoment")}
어릴적 꿈: ${val("childhoodDream")}
현재 즐거움: ${val("currentWish")}
삶의 가치: ${val("values")}
미래 희망: ${val("futureWish")}

[요청]
- 5페이지 그림책 작성
- 각 페이지마다 "페이지 내용:"
- 각 페이지마다 "이미지 프롬프트:"
`;

  document.getElementById("promptPreview").textContent = p;
  localStorage.setItem("prompt", p);
}

function val(id){
  return document.getElementById(id).value;
}

// ===== ChatGPT 이동 =====
function goToChatGPT(){

  const text = document.getElementById("promptPreview").textContent;

  if(!text){
    alert("먼저 프롬프트를 생성하세요");
    return;
  }

  navigator.clipboard.writeText(text).then(()=>{
    alert("복사 완료! ChatGPT로 이동합니다");
    window.open("https://chat.openai.com/", "_blank");
  });
}

// ===== 리셋 =====
function resetAll(){
  if(confirm("정말 초기화할까요?")){
    localStorage.clear();
    location.reload();
  }
}

// ===== (추가 준비) 텍스트 파싱 =====
function parseTextAdvanced(full){

  let pages = full.split(/페이지\s*\d+/g).filter(t=>t.trim());

  return pages.map((p,i)=>{
    let text = p.match(/페이지 내용[:：]?\s*([\s\S]*?)(이미지|$)/);
    let img = p.match(/이미지.*?[:：]\s*([\s\S]*)/);

    return {
      page:i+1,
      content:text ? text[1].trim() : p.trim(),
      image:img ? img[1].trim() : ""
    }
  });
}

</script>

</body>
</html>
