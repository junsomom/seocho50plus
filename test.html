<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 그림책 도우미 (2604062041)</title>

<style>
body { font-family:sans-serif; margin:0; background:#fffbe6;}

.tabs { display:flex; }
.tab {
  flex:1;
  padding:14px;
  text-align:center;
  font-size:18px;
  background:#ffe0b2;
}
.tab.active {
  background:#f57c00;
  color:white;
}

.container { padding:15px; display:none;}
.container.active { display:block;}

.input-wrap {
  position:relative;
  margin-top:18px;
}

input, textarea {
  width:100%;
  padding:14px;
  padding-right:50px;
  font-size:18px;
  border-radius:10px;
  border:2px solid #f57c00;
}

.mic {
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  cursor:pointer;
}

button {
  width:100%;
  padding:14px;
  margin-top:12px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#f57c00;
  color:white;
}

.reset { background:#e53935; }

.box {
  background:#fff3e0;
  padding:12px;
  margin-top:15px;
  border-radius:10px;
  white-space:pre-wrap;
}

.example { font-size:14px; color:#888;}
</style>
</head>

<body>

<!-- 탭 -->
<div class="tabs">
  <div class="tab active" onclick="showTab('think', this)">🧠 생각주머니</div>
  <div class="tab" onclick="showTab('make', this)">📦 만들기상자</div>
</div>

<!-- 생각주머니 -->
<div id="think" class="container active">

<div id="questions"></div>

<button onclick="generatePrompt()">✨ 이야기 만들기</button>
<button onclick="goChat()">📋 복사 + ChatGPT 이동</button>
<button class="reset" onclick="resetAll()">🔄 새로 시작</button>

<div class="box" id="promptPreview"></div>

</div>

<!-- 만들기상자 -->
<div id="make" class="container">

<div class="box">
① ChatGPT 결과 복사<br>
② 아래 붙여넣기<br>
③ 버튼 누르기
</div>

<textarea id="fullText" placeholder="여기에 붙여넣기"></textarea>

<button onclick="parseStory()">📖 책으로 나누기</button>

<div id="result"></div>

</div>

<script>

// 질문
const questionsList = [
{id:"name", q:"성함", ex:"김영자"},
{id:"personality", q:"성격", ex:"따뜻함"},
{id:"childhood", q:"어린 시절 기억", ex:"친구들과 놀던 기억"},
{id:"moment", q:"특별한 순간", ex:"아이 출산"},
{id:"dream", q:"어릴 적 꿈", ex:"선생님"},
{id:"now", q:"요즘 즐거운 일", ex:"손주"},
{id:"value", q:"중요한 가치", ex:"가족"},
{id:"future", q:"앞으로 하고 싶은 일", ex:"여행"}
];

// 탭
function showTab(id, el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".container").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  document.getElementById(id).classList.add("active");
}

// 질문 생성
const qDiv = document.getElementById("questions");

questionsList.forEach(q=>{
  qDiv.innerHTML += `
  <div class="input-wrap">
    <div><b>${q.q}</b></div>
    <div class="example">예: ${q.ex}</div>

    <input id="${q.id}">
    <span class="mic" onclick="startVoice('${q.id}', this)">🎤</span>
  </div>`;
});

// 저장
document.addEventListener("input", ()=>{
  questionsList.forEach(q=>{
    localStorage.setItem(q.id, document.getElementById(q.id).value);
  });
});

// 불러오기
window.onload = ()=>{
  questionsList.forEach(q=>{
    if(localStorage.getItem(q.id)){
      document.getElementById(q.id).value = localStorage.getItem(q.id);
    }
  });

  if(localStorage.getItem("prompt")){
    document.getElementById("promptPreview").textContent = localStorage.getItem("prompt");
  }
};

// 프롬프트 생성
function generatePrompt(){
  let p = `
주인공: ${val("name")}

성격: ${val("personality")}
어린시절: ${val("childhood")}
특별한 순간: ${val("moment")}
꿈: ${val("dream")}
현재: ${val("now")}
가치: ${val("value")}
미래: ${val("future")}

5페이지 그림책 작성
`;

  document.getElementById("promptPreview").textContent = p;
  localStorage.setItem("prompt", p);
  document.getElementById("promptPreview").scrollIntoView({behavior:"smooth"});
}

function val(id){ return document.getElementById(id).value; }

// 이동
function goChat(){
  let text = document.getElementById("promptPreview").textContent;

  if(!text){
    alert("먼저 이야기 만들기");
    return;
  }

  navigator.clipboard.writeText(text).then(()=>{
    alert("복사 완료 → ChatGPT 이동");
    window.open("https://chat.openai.com/");
  });
}

// 리셋
function resetAll(){
  if(confirm("초기화할까요?")){
    localStorage.clear();
    location.reload();
  }
}

// 음성
function startVoice(id, el){

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("크롬 사용해주세요");
    return;
  }

  let recognition = new SpeechRecognition();
  recognition.lang="ko-KR";

  recognition.onstart=()=>{
    el.innerText="🛑";
  };

  recognition.onresult=(e)=>{
    document.getElementById(id).value = e.results[0][0].transcript;
  };

  recognition.onend=()=>{
    el.innerText="🎤";
    moveNext(id);
  };

  recognition.start();
}

// 다음 이동
function moveNext(currentId){
  const idx = questionsList.findIndex(q=>q.id===currentId);
  if(idx < questionsList.length-1){
    const next = questionsList[idx+1].id;
    document.getElementById(next).focus();
    document.getElementById(next).scrollIntoView({behavior:"smooth"});
  }
}

// 분류
function parseStory(){

  let full = document.getElementById("fullText").value;

  if(!full){
    alert("붙여넣기 필요");
    return;
  }

  let pages = full.split(/페이지\s*\d+/).filter(t=>t.trim());

  if(pages.length===0){
    alert("형식 오류");
    return;
  }

  let html = `<div class="box">✔ ${pages.length}페이지 분리됨</div>`;

  pages.forEach((p,i)=>{
    html += `<div class="box"><b>${i+1}페이지</b><br>${p}</div>`;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
