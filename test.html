<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서초50플러스 - AI 그림책 도우미</title>
<style>
body { font-family: 'Pretendard', sans-serif; background: #fffbe6; margin:0; padding:0;}
header {text-align:center; background:#f57c00; color:white; font-size:32px; padding:20px 0; font-weight:bold;}
.container {max-width:700px; margin:0 auto; padding:20px;}
button, .link-btn {width:100%; padding:22px; margin-top:15px; font-size:26px; border-radius:16px; border:none; cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,0.3);}
button.main-btn { background:#f57c00; color:white; font-weight:bold; }
button.copy-btn { background:#ffb74d; color:white; font-weight:bold; }
.link-btn { background:#4dd0e1; color:white; text-align:center; display:block; text-decoration:none; line-height:normal; margin-top:5px; font-weight:bold;}
input, textarea {width:100%; padding:20px; font-size:24px; border-radius:16px; border:2px solid #f57c00; margin-top:12px; box-sizing:border-box; background:white;}
textarea { resize:none; }
.mic-btn {position:absolute; right:15px; top:50%; transform:translateY(-50%); font-size:28px; background:#ffd54f; border:2px solid #f57c00; border-radius:50%; width:60px; height:60px; cursor:pointer;}
.mic-status { margin-top:5px; color:#f57c00; font-size:20px; font-weight:bold;}
.gender-btns { display:flex; gap:15px; margin-top:12px; }
.gender-btn { flex:1; padding:20px; font-size:24px; border-radius:16px; border:2px solid #f57c00; background:white; cursor:pointer; text-align:center; font-weight:bold; }
.gender-btn.active { background:#f57c00; color:white; border-color:#e65100; }
.tab-btns { display:flex; gap:5px; margin-bottom:20px; }
.tab-btn { flex:1; padding:18px; font-size:24px; cursor:pointer; background:#ffcc80; border-radius:16px; text-align:center; font-weight:bold;}
.tab-btn.active { background:#f57c00; color:white; }
.box { background:#fff3e0; padding:20px; border-radius:16px; margin-top:15px; font-size:22px; white-space:pre-wrap; overflow-x:auto; position:relative; }
.accordion { background:#ffd54f; border-radius:14px; cursor:pointer; padding:16px; margin-top:10px; font-size:22px; font-weight:bold; border:none; text-align:left; outline:none; transition:0.2s; }
.accordion.active, .accordion:hover { background:#ffca28; }
.panel { padding:0 12px; display:none; background:white; overflow:hidden; border-radius:0 0 14px 14px; margin-bottom:10px; font-size:22px; }
.panel button { width:auto; margin-top:10px; margin-right:5px; font-size:20px; }
@media(max-width:400px){
    .mic-btn { width:50px; height:50px; font-size:22px; right:5px; }
    button, .link-btn { font-size:20px; padding:16px; }
    input, textarea { font-size:20px; padding:16px; }
    .gender-btn { font-size:20px; padding:16px; }
    .tab-btn { font-size:18px; padding:12px; }
}
</style>
</head>
<body>

<header id="header-title">생각주머니</header>
<div class="container">
    <div class="tab-btns">
        <div id="tab1" class="tab-btn active" onclick="switchTab(1)">생각주머니</div>
        <div id="tab2" class="tab-btn" onclick="switchTab(2)">만들기 상자</div>
    </div>

    <!-- 생각주머니 -->
    <div id="tabContent1">
        <div id="questions"></div>
        <button class="main-btn" onclick="generatePrompt()">👉 프롬프트 생성</button>
        <div class="box">생성된 프롬프트는 아래에 표시됩니다. ChatGPT에 붙여넣으세요.</div>
        <div id="promptPreview" class="box"></div>
        <button class="copy-btn" onclick="copyPrompt()">📋 프롬프트 복사</button>
        <a href="https://chat.openai.com/" class="link-btn" target="_blank">💬 ChatGPT 열기</a>
    </div>

    <!-- 만들기상자 -->
    <div id="tabContent2" style="display:none;">
        <label style="font-size:24px; font-weight:bold;">ChatGPT에서 나온 전체 텍스트를 붙여넣으세요</label>
        <textarea id="fullText" rows="10" placeholder="전체 텍스트 붙여넣기"></textarea>
        <button class="main-btn" onclick="parseText()">📦 분류하기</button>
        <div id="parsedOutput"></div>
    </div>
</div>

<script>
// ====== 질문 목록 (업데이트) ======
const questionsList = [
  {id:"name", q:"안녕하세요! 이름과 남자인지 여자인지 알려주세요.", type:"text", placeholder:"예: 영숙"},
  {id:"childhood", q:"어릴 때 가장 즐거웠던 기억이 있나요? 어디서, 누구랑 있었나요?", type:"text", placeholder:"예: 친구들과 동네 골목에서 숨바꼭질"},
  {id:"family", q:"가족과 함께 있어서 행복했던 순간이 있나요? 어떤 일이었나요?", type:"text", placeholder:"예: 손주가 태어나 처음 안았을 때"},
  {id:"young", q:"젊었을 때 기억에 남는 일이나 즐거웠던 사건이 있나요?", type:"text", placeholder:"예: 첫 직장에서 큰 일을 잘 해냈을 때"},
  {id:"hobby", q:"지금도 즐겁게 하고 있는 일이나 평생 좋아했던 취미가 있나요?", type:"text", placeholder:"예: 꽃을 가꾸는 일"},
  {id:"lesson", q:"살아오면서 기억에 남는 말이나 깨달음이 있나요?", type:"text", placeholder:"예: 작은 행복을 소중히 하라"},
  {id:"message", q:"손주나 후배에게 꼭 해주고 싶은 말이 있나요?", type:"text", placeholder:"예: 늘 건강하고 행복하길 바란다"}
];

let selectedGender="할머니";
const questionsDiv = document.getElementById("questions");
questionsList.forEach(q=>{
  let html = `<label style="font-size:24px; font-weight:bold;">${q.q}</label>`;
  html += `<div style="position:relative;">`;
  html += `<input type="${q.type}" id="${q.id}" placeholder="${q.placeholder}">`;
  html += `<button class="mic-btn" onclick="startVoice('${q.id}')">🎤</button>`;
  html += `</div><div id="micStatus${q.id}" class="mic-status"></div>`;
  if(q.id==="name"){
      html += `<div class="gender-btns">
        <div id="btn-female" class="gender-btn active" onclick="setGender('할머니','btn-female')">할머니</div>
        <div id="btn-male" class="gender-btn" onclick="setGender('할아버지','btn-male')">할아버지</div>
      </div>`;
  }
  questionsDiv.innerHTML += html;
});

// ====== 탭 전환 ======
function switchTab(n){
    document.getElementById("tabContent1").style.display = n===1 ? "block" : "none";
    document.getElementById("tabContent2").style.display = n===2 ? "block" : "none";
    document.getElementById("header-title").textContent = n===1 ? "생각주머니" : "만들기 상자";
    document.getElementById("tab1").classList.toggle("active", n===1);
    document.getElementById("tab2").classList.toggle("active", n===2);
}

// ====== 성별 ======
function setGender(g, btnId){
    selectedGender=g;
    document.querySelectorAll(".gender-btn").forEach(btn=>btn.classList.remove("active"));
    document.getElementById(btnId).classList.add("active");
}

// ====== 음성 입력 ======
function startVoice(targetId){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const statusId = "micStatus" + targetId;
    const statusEl = document.getElementById(statusId);
    if(!SpeechRecognition){ alert("음성 입력을 지원하지 않습니다."); return; }
    const recognition = new SpeechRecognition();
    recognition.lang="ko-KR";
    statusEl.textContent = "🎤 음성 입력 중… 말을 마치면 자동 종료됩니다";
    recognition.start();
    recognition.onresult = function(event){
        document.getElementById(targetId).value = event.results[0][0].transcript;
        statusEl.textContent = "✅ 입력 완료";
        setTimeout(()=>{statusEl.textContent=""},3000);
    };
    recognition.onerror=function(){ statusEl.textContent="❌ 입력 실패"; setTimeout(()=>{statusEl.textContent=""},3000); }
}

// ====== 프롬프트 생성 ======
function generatePrompt(){
    let prompt = `당신은 동화 작가입니다. 다음 내용을 바탕으로 5페이지 그림책을 만드세요.\n\n[주인공] ${selectedGender} ${document.getElementById("name").value}\n`;
    prompt += `[어린 시절] ${document.getElementById("childhood").value}\n`;
    prompt += `[가족] ${document.getElementById("family").value}\n`;
    prompt += `[청년기] ${document.getElementById("young").value}\n`;
    prompt += `[취미] ${document.getElementById("hobby").value}\n`;
    prompt += `[교훈] ${document.getElementById("lesson").value}\n`;
    prompt += `[메시지] ${document.getElementById("message").value}\n`;
    prompt += `[규칙]\n1. 5페이지로 작성\n2. 각 페이지별 구글 플로우용 영문 이미지 프롬프트 생성\n3. 스타일: Soft watercolor, Ghibli style, warm sunlight, peaceful\n`;
    document.getElementById("promptPreview").textContent = prompt;
    localStorage.setItem("savedPrompt", prompt);
}

// ====== 복사 ======
function copyPrompt(){
    const text=document.getElementById("promptPreview").textContent;
    navigator.clipboard.writeText(text).then(()=>{alert("프롬프트가 복사되었습니다!");});
}

// ====== 텍스트 분류 및 아코디언 ======
function parseText(){
    const full = document.getElementById("fullText").value.trim();
    if(!full){ alert("텍스트를 붙여넣어 주세요."); return; }
    let lines = full.split(/\n/);
    let parsedHTML = "";
    lines.forEach((line)=>{
        if(line.match(/^제목:/)){
            parsedHTML += `<button class="accordion">제목</button><div class="panel">${line.replace(/^제목:/,'').trim()}<br><button class="copy-box-btn" onclick="copyText(this)">📋 복사</button><a href='https://www.canva.com/create/books/' target='_blank' class='link-btn'>🎨 캔바 바로가기</a></div>`;
        } else if(line.match(/페이지 내용:/)){
            let pageNum = line.match(/(\d+)페이지/)[1];
            parsedHTML += `<button class="accordion">${pageNum}페이지 글</button><div class="panel">${line.replace(/\d+페이지 내용:/,'').trim()}<br><button class="copy-box-btn" onclick="copyText(this)">📋 복사</button><a href='https://www.canva.com/create/books/' target='_blank' class='link-btn'>🎨 캔바 바로가기</a></div>`;
        } else if(line.match(/이미지 프롬프트:/)){
            let pageNum = line.match(/(\d+)/)[1];
            parsedHTML += `<button class="accordion">${pageNum}페이지 그림명령어</button><div class="panel">${line.replace(/이미지 프롬프트:/,'').trim()}<br><button class="copy-box-btn" onclick="copyText(this)">📋 복사</button><a href='https://flow.google.com/' target='_blank' class='link-btn'>🌐 구글 플로우 바로가기</a></div>`;
        }
    });
    document.getElementById("parsedOutput").innerHTML = parsedHTML;

    let acc = document.getElementsByClassName("accordion");
    for(let i=0;i<acc.length;i++){
        acc[i].onclick=function(){
            this.classList.toggle("active");
            let panel=this.nextElementSibling;
            panel.style.display = (panel.style.display==='block') ? 'none':'block';
        }
    }
    localStorage.setItem("savedFullText", full);
}

// ====== 박스 복사 ======
function copyText(btn){
    const text = btn.parentElement.textContent.replace('📋 복사','').trim();
    navigator.clipboard.writeText(text).then(()=>{
        btn.textContent="✅ 복사됨";
        setTimeout(()=>{btn.textContent="📋 복사";},1500);
    });
}

// ====== 로컬스토리지 복원 ======
window.onload=function(){
    if(localStorage.getItem("savedPrompt")){
        document.getElementById("promptPreview").textContent = localStorage.getItem("savedPrompt");
    }
    if(localStorage.getItem("savedFullText")){
        document.getElementById("fullText").value = localStorage.getItem("savedFullText");
        parseText();
    }
}
</script>
</body>
</html>
