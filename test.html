<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서초50플러스 - AI 그림책 도우미</title>
<style>
/* 기본 스타일 */
body {
    font-family: 'Pretendard', sans-serif;
    background: #f9f9f9;
    margin:0; padding:0;
}
header {
    text-align:center;
    background:#4CAF50;
    color:white;
    font-size:28px;
    padding:15px 0;
}
.container {
    max-width:600px;
    margin:0 auto;
    padding:20px;
}
button, .link-btn {
    width:100%;
    padding:18px;
    margin-top:15px;
    font-size:22px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
}
button.main-btn { background:#2E7D32; color:white; }
button.copy-btn { background:#FFA726; color:white; }
.link-btn {
    background:#29B6F6;
    color:white;
    text-align:center;
    display:block;
    text-decoration:none;
    line-height:normal;
    margin-top:5px;
}
input, textarea {
    width:100%;
    padding:16px;
    font-size:20px;
    border-radius:12px;
    border:2px solid #4CAF50;
    margin-top:8px;
    box-sizing:border-box;
    background:white;
}
textarea { resize:none; }
.mic-btn {
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    font-size:24px;
    background:#eee;
    border:1px solid #ccc;
    border-radius:50%;
    width:50px;
    height:50px;
    cursor:pointer;
}
.mic-status { margin-top:5px; color:#2E7D32; font-size:18px; }
.gender-btns { display:flex; gap:15px; margin-top:10px; }
.gender-btn { flex:1; padding:18px; font-size:22px; border-radius:12px; border:2px solid #ccc; background:white; cursor:pointer; text-align:center; }
.gender-btn.active { background:#4CAF50; color:white; border-color:#2E7D32; }
.tab-btns { display:flex; gap:5px; margin-bottom:20px; }
.tab-btn { flex:1; padding:15px; font-size:22px; cursor:pointer; background:#ccc; border-radius:12px; text-align:center; }
.tab-btn.active { background:#2E7D32; color:white; }
.box { background:#fffde7; padding:15px; border-radius:12px; margin-top:15px; font-size:20px; white-space:pre-wrap; overflow-x:auto; position:relative; }
.box-header { font-weight:bold; margin-bottom:5px; }
.copy-box-btn { margin-top:5px; background:#FFA726; color:white; border-radius:10px; padding:12px; font-size:20px; cursor:pointer; width:auto; }
.box-footer { margin-top:5px; display:flex; gap:10px; }
.box-footer a { flex:1; }

/* 모바일 최적화 */
@media(max-width:400px){
    .mic-btn { width:40px; height:40px; font-size:20px; right:5px; }
    button, .link-btn { font-size:18px; padding:12px; }
    input, textarea { font-size:18px; padding:12px; }
    .gender-btn { font-size:18px; padding:12px; }
    .tab-btn { font-size:18px; padding:10px; }
}
</style>
</head>
<body>

<header id="header-title">생각주머니</header>

<div class="container">
    <!-- 탭 -->
    <div class="tab-btns">
        <div id="tab1" class="tab-btn active" onclick="switchTab(1)">생각주머니</div>
        <div id="tab2" class="tab-btn" onclick="switchTab(2)">만들기 상자</div>
    </div>

    <!-- 생각주머니 화면 -->
    <div id="tabContent1">
        <label>성함이 어떻게 되시나요?</label>
        <div style="position:relative;">
            <input type="text" id="userName" placeholder="예: 영숙 할머니">
            <button class="mic-btn" onclick="startVoice('userName')">🎤</button>
        </div>
        <div id="micStatusName" class="mic-status"></div>

        <label>성별을 선택해주세요</label>
        <div class="gender-btns">
            <div id="btn-female" class="gender-btn active" onclick="setGender('할머니','btn-female')">할머니</div>
            <div id="btn-male" class="gender-btn" onclick="setGender('할아버지','btn-male')">할아버지</div>
        </div>

        <label>가장 행복했던 기억은?</label>
        <div style="position:relative;">
            <input type="text" id="memory" placeholder="예: 손주가 태어났을 때">
            <button class="mic-btn" onclick="startVoice('memory')">🎤</button>
        </div>
        <div id="micStatusMemory" class="mic-status"></div>

        <label>그때 어떤 일이 있었나요?</label>
        <div style="position:relative;">
            <textarea id="story" rows="5" placeholder="예: 가족들이 모여 밥을 먹었어요"></textarea>
            <button class="mic-btn" style="top:10px;" onclick="startVoice('story')">🎤</button>
        </div>
        <div id="micStatusStory" class="mic-status"></div>

        <button class="main-btn" onclick="generatePrompt()">👉 프롬프트 생성</button>

        <div class="box">아래 텍스트를 ChatGPT에 붙여넣으면 AI가 그림책 내용을 만들어 줍니다.</div>
        <div id="promptPreview" class="box"></div>
        <button class="copy-btn" onclick="copyPrompt()">📋 복사</button>

        <a href="https://chat.openai.com/" class="link-btn" target="_blank">💬 ChatGPT 열기</a>
    </div>

    <!-- 만들기 상자 화면 -->
    <div id="tabContent2" style="display:none;">
        <label>ChatGPT에서 나온 전체 텍스트를 여기에 붙여넣으세요</label>
        <textarea id="fullText" rows="10" placeholder="전체 텍스트 붙여넣기"></textarea>
        <button class="main-btn" onclick="parseText()">📦 분류하기</button>
        <div id="parsedOutput"></div>
    </div>
</div>

<script>
let selectedGender = "할머니";

// 탭 전환
function switchTab(n){
    document.getElementById("tabContent1").style.display = n===1 ? "block" : "none";
    document.getElementById("tabContent2").style.display = n===2 ? "block" : "none";
    document.getElementById("header-title").textContent = n===1 ? "생각주머니" : "만들기 상자";
    document.getElementById("tab1").classList.toggle("active", n===1);
    document.getElementById("tab2").classList.toggle("active", n===2);
}

// 성별 선택
function setGender(g, btnId){
    selectedGender=g;
    document.querySelectorAll(".gender-btn").forEach(btn=>btn.classList.remove("active"));
    document.getElementById(btnId).classList.add("active");
}

// 음성 입력
function startVoice(targetId){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const statusId = "micStatus" + targetId.charAt(0).toUpperCase() + targetId.slice(1);
    const statusEl = document.getElementById(statusId);
    if(!SpeechRecognition){ alert("이 핸드폰은 음성 입력을 지원하지 않아요 😢"); return; }
    const recognition = new SpeechRecognition();
    recognition.lang="ko-KR";
    statusEl.textContent = "🎤 음성 입력 중… 말을 마치면 자동 종료됩니다";
    recognition.start();
    recognition.onresult = function(event){
        document.getElementById(targetId).value = event.results[0][0].transcript;
        statusEl.textContent = "✅ 음성 입력 완료";
        setTimeout(()=>{statusEl.textContent=""},3000);
    };
    recognition.onerror=function(){
        statusEl.textContent="❌ 음성 입력 실패"; 
        setTimeout(()=>{statusEl.textContent=""},3000); 
    }
}

// 프롬프트 생성
function generatePrompt(){
    const name = document.getElementById("userName").value.trim();
    const memory = document.getElementById("memory").value.trim();
    const story = document.getElementById("story").value.trim();
    if(!name||!memory||!story){ alert("모든 빈칸을 채워주세요! 😊"); return; }
    const prompt = `당신은 동화 작가입니다. 다음 내용을 바탕으로 5페이지 분량의 그림책을 만드세요.\n\n[주인공] 한국인 ${selectedGender} ${name}\n[기억] ${memory}\n[내용] ${story}\n\n[규칙]\n1. 한글로 따뜻한 이야기 내용을 작성하세요.\n2. 각 페이지별로 구글 플로우용 영어 프롬프트를 만드세요.\n3. 스타일: 'Soft watercolor, Ghibli style, warm sunlight, peaceful'.\n4. 과거 장면의 나이는 입력 내용에 따라 판단하여 적절하게 그리세요 (어린 시절, 청년기, 장년기 등).\n5. 현재 장면은 노년 모습으로 그리세요.\n6. 페이지는 반드시 5페이지로 고정 (표지 제외).\n\n[형식]\n제목: \n1페이지 내용:\n이미지 프롬프트: (영문)\n2페이지 내용:\n이미지 프롬프트: (영문)\n3페이지 내용:\n이미지 프롬프트: (영문)\n4페이지 내용:\n이미지 프롬프트: (영문)\n5페이지 내용:\n이미지 프롬프트: (영문)`;
    document.getElementById("promptPreview").textContent = prompt;
}

// 프롬프트 복사
function copyPrompt(){
    const text=document.getElementById("promptPreview").textContent;
    try{
        navigator.clipboard.writeText(text).then(()=>{alert("프롬프트가 클립보드에 복사되었습니다!");});
    }catch(e){
        alert("클립보드 복사가 지원되지 않는 환경입니다.");
    }
}

// 텍스트 분류
function parseText(){
    const full = document.getElementById("fullText").value.trim();
    if(!full){ alert("텍스트를 붙여넣어 주세요."); return; }

    const titleMatch = full.match(/제목:\s*(.+)/i);
    const pageMatches = full.match(/(\d+)페이지 내용:\s*([\s\S]*?)(?=\d+페이지 내용:|$)/gi) || [];
    const imgMatches = full.match(/이미지 프롬프트:\s*([\s\S]*?)(?=\d+페이지 내용:|$)/gi) || [];

    let parsedHTML = "";
    if(titleMatch){
        parsedHTML += `<div class="box"><div class="box-header">제목</div>${titleMatch[1].trim()}<div class="box-footer"><button class='copy-box-btn' onclick='copyBox(this)'>📋 복사</button><a href='https://www.canva.com/create/books/' target='_blank' class='link-btn'>🎨 캔바 바로가기</a></div></div>`;
    }

    for(let i=0;i<5;i++){
        const pageNum = i+1;
        // 글
        let pageText = pageMatches[i]? pageMatches[i].replace(/\d+페이지 내용:/i,'').trim() : "";
        parsedHTML += `<div class="box"><div class="box-header">${pageNum}페이지 글</div>${pageText}<div class="box-footer"><button class='copy-box-btn' onclick='copyBox(this)'>📋 복사</button><a href='https://www.canva.com/create/books/' target='_blank' class='link-btn'>🎨 캔바 바로가기</a></div></div>`;
        // 그림
        let imgText = imgMatches[i]? imgMatches[i].replace(/이미지 프롬프트:/i,'').trim() : "";
        parsedHTML += `<div class="box"><div class="box-header">${pageNum}페이지 그림명령어</div>${imgText}<div class="box-footer"><button class='copy-box-btn' onclick='copyBox(this)'>📋 복사</button><a href='https://flow.google.com/' target='_blank' class='link-btn'>🌐 구글 플로우 바로가기</a></div></div>`;
    }

    document.getElementById("parsedOutput").innerHTML = parsedHTML;
}

// 박스 복사
function copyBox(btn){
    try{
        const text = btn.parentElement.parentElement.querySelector(".box-header").nextSibling.textContent.trim();
        navigator.clipboard.writeText(text).then(()=>{
            btn.style.background="#4CAF50";
            btn.textContent="✅ 복사됨";
            setTimeout(()=>{ btn.style.background="#FFA726"; btn.textContent="📋 복사"; },1500);
        });
    }catch(e){
        alert("클립보드 복사가 지원되지 않는 환경입니다.");
    }
}
</script>

</body>
</html>
