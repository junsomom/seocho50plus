<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서초50플러스 - AI 그림책 만들기</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            padding: 20px;
            background: #f9f9f9;
            font-size: 22px;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #2E7D32;
            font-size: 28px;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-top: 25px;
            font-weight: bold;
            color: #333;
        }
        .input-wrap {
            position: relative;
            margin-top: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 18px;
            box-sizing: border-box;
            font-size: 20px;
            border-radius: 12px;
            border: 2px solid #4CAF50;
            background: white;
        }
        textarea {
            rows: 5;
        }
        .mic-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
        }
        .gender-btns {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .gender-btn {
            flex: 1;
            padding: 18px;
            font-size: 22px;
            border-radius: 12px;
            border: 2px solid #ccc;
            background: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .gender-btn.active {
            background: #4CAF50;
            color: white;
            border-color: #2E7D32;
        }
        .gender-btn:active {
            transform: scale(0.97);
        }
        .checkbox-wrap {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            background: #e8f5e9;
            color: #2E7D32;
            padding: 15px;
            border-radius: 10px;
        }
        input[type="checkbox"] {
            width: 25px;
            height: 25px;
        }
        button.main-btn {
            width: 100%;
            padding: 25px;
            margin-top: 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px;
            border: none;
            background: #2E7D32;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        button.main-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h2>📖 AI 그림책 만들기</h2>

    <label>성함이 어떻게 되시나요?</label>
    <div class="input-wrap">
        <input type="text" id="userName" placeholder="예: 영숙 할머니">
        <button class="mic-btn" onclick="startVoice('userName')">🎤</button>
    </div>

    <label>성별을 선택해주세요</label>
    <div class="gender-btns">
        <button id="btn-female" class="gender-btn" onclick="setGender('할머니', 'btn-female')">할머니</button>
        <button id="btn-male" class="gender-btn" onclick="setGender('할아버지', 'btn-male')">할아버지</button>
    </div>

    <div class="checkbox-wrap">
        <input type="checkbox" id="isChild">
        <label for="isChild" style="margin-top:0;">어린 시절 이야기를 넣을까요?</label>
    </div>

    <label>가장 행복했던 기억은?</label>
    <div class="input-wrap">
        <input type="text" id="memory" placeholder="예: 손주가 태어났을 때">
        <button class="mic-btn" onclick="startVoice('memory')">🎤</button>
    </div>

    <label>그때 어떤 일이 있었나요?</label>
    <div class="input-wrap">
        <textarea id="story" placeholder="예: 가족들이 모여 밥을 먹었어요"></textarea>
        <button class="mic-btn" style="top: 25px;" onclick="startVoice('story')">🎤</button>
    </div>

    <button class="main-btn" onclick="goChatGPT()">👉 그림책 만들기 시작!</button>

    <script>
        let selectedGender = "할머니";

        // 초기 활성화
        document.getElementById("btn-female").classList.add("active");

        function setGender(g, btnId) {
            selectedGender = g;
            document.querySelectorAll(".gender-btn").forEach(btn => btn.classList.remove("active"));
            document.getElementById(btnId).classList.add("active");
        }

        function startVoice(targetId) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("이 핸드폰은 음성 입력을 지원하지 않아요 😢");
                return;
            }
            const recognition = new SpeechRecognition();
            recognition.lang = "ko-KR";
            recognition.start();
            recognition.onresult = function(event) {
                document.getElementById(targetId).value = event.results[0][0].transcript;
            };
            recognition.onend = function() {
                recognition.stop();
            };
        }

        function goChatGPT() {
            const name = document.getElementById("userName").value.trim();
            const memory = document.getElementById("memory").value.trim();
            const story = document.getElementById("story").value.trim();
            const isChild = document.getElementById("isChild").checked;

            if (!name || !memory || !story) {
                alert("모든 빈칸을 채워주세요! 😊");
                return;
            }

            const ageRule = isChild ? "과거 장면은 아이의 모습으로, 현재 장면은 노년의 모습으로 그리세요." : "모든 장면은 따뜻한 노년의 모습으로 그리세요.";

            const prompt = `
당신은 동화 작가입니다. 다음 내용을 바탕으로 5페이지 분량의 그림책을 만드세요.

[주인공] 한국인 ${selectedGender} ${name}
[기억] ${memory}
[내용] ${story}

[규칙]
1. 한글로 따뜻한 이야기 내용을 작성하세요.
2. 각 페이지별로 구글 Imagen(이미지 생성 AI)을 위한 영어 프롬프트를 만드세요.
3. 스타일: 'Soft watercolor, Ghibli style, warm sunlight, peaceful'.
4. ${ageRule}

[형식]
제목: 
1페이지 내용:
이미지 프롬프트: (영문으로)
... (5페이지까지 반복)
`;

            alert("아래 프롬프트를 복사하여 ChatGPT에 붙여넣으세요:\n\n" + prompt);
        }
    </script>
</body>
</html>
